<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>อุทยานป็อบ · UTTAYAN POP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #1a5d1a;
            --primary-light: #2e7d2e;
            --secondary: #f0fdf4;
            --accent: #fbbf24;
            --text: #1e293b;
            --text-light: #475569;
            --card-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
        }

        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e8 100%);
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--text);
        }

        .main-card {
            background: rgba(255, 255, 255, 0.97);
            width: 100%;
            max-width: 460px;
            border-radius: 48px;
            box-shadow: var(--card-shadow);
            padding: 28px 24px 36px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .logo {
            width: 72px;
            margin-bottom: 8px;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.1));
        }

        header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #1a5d1a, #3b8b3b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--secondary);
            color: var(--primary);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            border: 1px solid #c4e6c4;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin: 28px 0 20px;
        }

        .stat-card {
            background: var(--secondary);
            padding: 16px 8px;
            border-radius: 32px;
            border: 1px solid #dcfce7;
        }

        .stat-card div {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .game-box {
            margin: 10px 0;
            display: flex;
            justify-content: center;
        }

        #pop-img {
            width: 220px;
            cursor: pointer;
            transition: transform 0.08s cubic-bezier(0.2, 1.6, 0.5, 1);
            filter: drop-shadow(0 14px 18px rgba(0, 0, 0, 0.2));
            user-select: none;
        }

        .pop-active {
            transform: scale(0.88) rotate(3deg) !important;
        }

        .leaderboard-section {
            margin-top: 32px;
            text-align: left;
            background: #ffffffcc;
            border-radius: 32px;
            padding: 4px 0 12px 0;
        }

        .leaderboard-section h3 {
            font-size: 20px;
            border-left: 5px solid var(--primary);
            padding-left: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rank-list {
            background: #ffffffdd;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #e9f0e9;
        }

        .rank-item .pts {
            font-weight: 700;
            color: var(--primary);
            background: #eaf5ea;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 14px;
        }

        @media (max-width: 460px) {
            #pop-img { width: 180px; }
        }
    </style>
</head>
<body>

<audio id="pop-sound-1" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
<audio id="pop-sound-2" src="https://www.soundjay.com/buttons/sounds/button-17.mp3" preload="auto"></audio>
<audio id="pop-sound-3" src="https://www.soundjay.com/buttons/sounds/button-19.mp3" preload="auto"></audio>

<div class="main-card">
    <header>
        <img src="https://uskofficial.github.io/UTTAYANHeartNewSeedCamp/assets/img/logo.png" class="logo" alt="Logo" onerror="this.src='https://i.postimg.cc/WztgWSpc/IMG-7790.png'">
        <h1>อุทยานป็อบ</h1>
        <div class="badge"><i class="fas fa-tree"></i> UTTAYAN POP <i class="fas fa-crown"></i></div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <small><i class="fas fa-chart-line"></i> ระดับเลเวล</small>
            <div id="lv">1</div>
        </div>
        <div class="stat-card">
            <small><i class="fas fa-star"></i> คะแนนรวม</small>
            <div id="score">0</div>
        </div>
    </div>

    <div class="game-box">
        <img src="https://i.postimg.cc/WztgWSpc/IMG-7790.png" id="pop-img" draggable="false">
    </div>

    <div class="leaderboard-section">
        <h3><i class="fas fa-trophy" style="color:#fbbf24;"></i> อันดับนักกดสูงสุด</h3>
        <div id="rank-list" class="rank-list">
            <div class="loading">กำลังโหลดอันดับ...</div>
        </div>
    </div>
</div>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDXVXeobHQE_MrUcfyvK-G16gtGa8bdEHc",
        authDomain: "uttayanpop.firebaseapp.com",
        databaseURL: "https://uttayanpop-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "uttayanpop",
        storageBucket: "uttayanpop.firebasestorage.app",
        messagingSenderId: "740525391264",
        appId: "1:740525391264:web:4ab7ddafb1ad75d4aab8c5",
        measurementId: "G-67504CKL26"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. ตัวแปรในเกม
    let currentScore = 0;
    let playerName = "";
    const popImg = document.getElementById('pop-img');

    // 3. ฟังก์ชันเสียง
    function playPopSound() {
        const soundNum = Math.floor(Math.random() * 3) + 1;
        const sound = document.getElementById(`pop-sound-${soundNum}`);
        if (sound) { sound.currentTime = 0; sound.play().catch(()=>{}); }
    }

    // 4. ฟังก์ชันหลักเมื่อกด
    function doPop(e) {
        if (e) e.preventDefault();
        playPopSound();
        currentScore++;
        
        const lv = Math.floor(currentScore / 50) + 1;
        document.getElementById('score').innerText = currentScore.toLocaleString();
        document.getElementById('lv').innerText = lv;

        popImg.classList.add('pop-active');
        setTimeout(() => popImg.classList.remove('pop-active'), 100);

        if (playerName) {
            db.ref('players/' + encodeURIComponent(playerName)).set({
                name: playerName,
                score: currentScore,
                level: lv
            });
        }
        if (navigator.vibrate) navigator.vibrate(15);
    }

    // 5. ระบบชื่อและอันดับ
    window.onload = () => {
        playerName = prompt("กรุณาใส่ชื่อของคุณ:") || "นักกด_" + Math.floor(Math.random()*100);
        
        // โหลดคะแนนเดิม
        db.ref('players/' + encodeURIComponent(playerName)).once('value').then(snap => {
            if (snap.exists()) {
                currentScore = snap.val().score;
                document.getElementById('score').innerText = currentScore.toLocaleString();
                document.getElementById('lv').innerText = snap.val().level;
            }
        });

        // ดึงอันดับสด
        db.ref('players').orderByChild('score').limitToLast(8).on('value', snap => {
            let html = "";
            let players = [];
            snap.forEach(child => players.push(child.val()));
            players.sort((a,b) => b.score - a.score).forEach((p, i) => {
                html += `<div class="rank-item">
                    <span>${i+1}. ${p.name}</span>
                    <span class="pts">${p.score.toLocaleString()}</span>
                </div>`;
            });
            document.getElementById('rank-list').innerHTML = html || "ยังไม่มีข้อมูล";
        });

        popImg.addEventListener('mousedown', doPop);
        popImg.addEventListener('touchstart', doPop);
    };
</script>
</body>
</html>
