<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>อุทยานป็อบ · UTTAYAN POP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e8 100%);
            font-family: 'Kanit', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.97);
            max-width: 460px; width: 100%;
            border-radius: 48px; padding: 24px 20px 28px;
            text-align: center; box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            position: relative;
        }
        .logo { width: 60px; margin-bottom: 6px; }
        .title-image { width: 100%; max-width: 380px; height: auto; filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.12)); }
        .badge {
            background: #f0fdf4; display: inline-flex; align-items: center;
            gap: 6px; padding: 4px 12px; border-radius: 40px; font-size: 11px; margin-top: 5px;
        }

        /* --- Vote Section --- */
        .vote-section {
            background: #fffbeb; border: 2px solid #fde68a;
            border-radius: 32px; padding: 20px; margin: 20px 0;
        }
        .vote-counter { font-size: 28px; font-weight: 800; color: #b45309; margin: 5px 0; }
        .progress-container {
            width: 100%; background: #fef3c7; height: 12px;
            border-radius: 10px; margin: 10px 0; overflow: hidden; border: 1px solid #fde68a;
        }
        #vote-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #f59e0b, #fbbf24);
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .vote-btn {
            background: #f59e0b; color: white; border: none; padding: 12px;
            border-radius: 40px; width: 100%; cursor: pointer; font-weight: 700;
            font-family: 'Kanit'; box-shadow: 0 4px 0 #b45309; transition: 0.1s;
        }
        .vote-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b45309; }
        .vote-btn:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; color: #9ca3af; }

        /* --- Game Section --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0 16px; }
        .stat-card { background: #f0fdf4; padding: 12px 8px; border-radius: 28px; }
        .stat-card small { color: #475569; font-size: 12px; }
        .stat-card div { font-size: 28px; font-weight: 800; color: #1a5d1a; }
        
        #pop-img {
            width: 180px; cursor: pointer; filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
            transition: transform 0.06s cubic-bezier(0.2, 1.6, 0.5, 1);
        }
        .pop-active { transform: scale(0.85) rotate(3deg) !important; }
        .locked { opacity: 0.3; filter: grayscale(1) !important; pointer-events: none; }
        .hidden { display: none !important; }

        /* --- Input & Leaderboard --- */
        .name-input-section { margin: 16px 0 8px; text-align: left; }
        .name-input-section input {
            width: 100%; padding: 10px 14px; border: 2px solid #cbe5cb;
            border-radius: 40px; font-family: 'Kanit'; font-size: 14px; outline: none;
        }
        .save-name-btn {
            background: #1a5d1a; color: white; border: none; padding: 10px;
            border-radius: 40px; width: 100%; margin-top: 8px; font-weight: 600; cursor: pointer;
        }
        .rank-list { background: #ffffffdd; border-radius: 24px; overflow: hidden; text-align: left; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #e9f0e9; font-size: 13px; }
        .pts { background: #eaf5ea; padding: 3px 10px; border-radius: 40px; font-weight: 700; color: #1a5d1a; }
        
        .toast-msg {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1a5d1a; color: white; padding: 8px 20px; border-radius: 40px;
            font-size: 12px; z-index: 1000;
        }
        .online-status { font-size: 9px; color: #16a34a; margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-card">
    <header>
        <img src="https://uskofficial.github.io/UTTAYANHeartNewSeedCamp/assets/img/logo.png" class="logo" onerror="this.src='https://i.postimg.cc/WztgWSpc/IMG-7790.png'">
        <div style="margin: 10px 0;"><img src="https://i.postimg.cc/FHrQjZMT/IMG-8866.png" class="title-image"></div>
        <div class="badge" id="status-badge"><i class="fas fa-lock"></i> รอการโหวตเพื่อเปิดระบบ</div>
    </header>

    <div id="vote-container" class="vote-section">
        <div style="font-size: 14px; font-weight: 600; color: #92400e;">อยากให้เปิดซีซั่นใหม่ไหม?</div>
        <div class="vote-counter" id="vote-count">0 / 1,000</div>
        <div class="progress-container"><div id="vote-bar"></div></div>
        <button class="vote-btn" id="voteBtn"><i class="fas fa-fingerprint"></i> กดโหวตด้วย IP เครื่อง</button>
        <div id="user-ip-text" style="font-size: 9px; margin-top: 8px; color: #b45309; opacity: 0.7;">กำลังตรวจสอบ IP...</div>
    </div>

    <div id="game-area">
        <div class="stats-grid">
            <div class="stat-card"><small>ระดับเลเวล</small><div id="lv">0</div></div>
            <div class="stat-card"><small>คะแนนรวม</small><div id="score">0</div></div>
        </div>

        <div class="game-box">
            <img src="https://i.postimg.cc/WztgWSpc/IMG-7790.png" id="pop-img" class="locked" draggable="false">
        </div>

        <div id="play-ui" class="hidden">
            <div class="name-input-section">
                <label style="font-size: 12px; color: #1a5d1a; margin-left: 10px;">ชื่อผู้เล่น</label>
                <input type="text" id="playerNameInput" placeholder="กรุณากรอกชื่อที่สุภาพ" maxlength="24">
                <button class="save-name-btn" id="saveNameBtn">▶ บันทึกชื่อและเริ่มเล่น</button>
            </div>
        </div>
        
        <div id="lock-hint" style="font-size: 11px; color: #64748b; margin-top: 15px;">
            <i class="fas fa-info-circle"></i> ระบบจะปลดล็อกให้เล่นเมื่อโหวตครบ 1,000 คน
        </div>
    </div>

    <div class="leaderboard-section" style="margin-top: 20px;">
        <h3 style="text-align: left; font-size: 16px; margin-bottom: 10px;"><i class="fas fa-trophy" style="color:#fbbf24;"></i> อันดับสูงสุด</h3>
        <div id="rank-list" class="rank-list">
            <div style="padding:15px; text-align:center; font-size:12px; color:#94a3b8;">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <div class="online-status" id="onlineStatus">
        <i class="fas fa-circle" style="font-size:6px;"></i> เชื่อมต่อฐานข้อมูลแล้ว
    </div>
</div>

<script>
    // ==================== CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDXVXeobHQE_MrUcfyvK-G16gtGa8bdEHc",
        authDomain: "uttayanpop.firebaseapp.com",
        databaseURL: "https://uttayanpop-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "uttayanpop",
        storageBucket: "uttayanpop.firebasestorage.app",
        messagingSenderId: "740525391264",
        appId: "1:740525391264:web:4ab7ddafb1ad75d4aab8c5"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userIP = "";
    let playerName = "";
    let currentScore = 0;
    const GOAL = 1000;

    // ==================== 1. ระบบโหวต (IP Based) ====================
    
    // ดึง IP Address
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => {
            userIP = data.ip;
            document.getElementById('user-ip-text').innerText = "IP เครื่องของคุณ: " + userIP;
            checkVoteStatus();
        })
        .catch(() => document.getElementById('user-ip-text').innerText = "ไม่สามารถระบุ IP ได้");

    function checkVoteStatus() {
        const ipKey = userIP.replace(/\./g, '_');
        db.ref('votes/' + ipKey).once('value', s => {
            if(s.exists()) {
                const b = document.getElementById('voteBtn');
                b.disabled = true;
                b.innerHTML = '<i class="fas fa-check-circle"></i> คุณได้โหวตไปแล้ว';
                b.style.background = "#94a3b8";
            }
        });
    }

    document.getElementById('voteBtn').onclick = () => {
        if(!userIP) return showToast("รอโหลดข้อมูลเครื่องสักครู่...");
        const ipKey = userIP.replace(/\./g, '_');
        db.ref('votes/' + ipKey).set({
            ip: userIP,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            showToast("🚀 โหวตสำเร็จ! ขอบคุณครับ");
        });
    };

    // ฟังผลโหวต Real-time เพื่อปลดล็อก
    db.ref('votes').on('value', (snap) => {
        const total = snap.numChildren();
        const percent = Math.min((total / GOAL) * 100, 100);
        document.getElementById('vote-count').innerText = `${total.toLocaleString()} / ${GOAL.toLocaleString()}`;
        document.getElementById('vote-bar').style.width = percent + "%";

        if(total >= GOAL) {
            unlockGame();
        }
    });

    function unlockGame() {
        document.getElementById('vote-container').classList.add('hidden');
        document.getElementById('pop-img').classList.remove('locked');
        document.getElementById('play-ui').classList.remove('hidden');
        document.getElementById('lock-hint').classList.add('hidden');
        document.getElementById('status-badge').innerHTML = '<i class="fas fa-star" style="color:#fbbf24"></i> ซีซั่นใหม่เริ่มแล้ว!';
        document.getElementById('status-badge').style.background = "#fffbeb";
    }

    // ==================== 2. ระบบเกม (UTTAYAN POP) ====================

    function addScore() {
        if (!playerName || document.getElementById('pop-img').classList.contains('locked')) return;
        
        currentScore++;
        document.getElementById('score').innerText = currentScore.toLocaleString();
        document.getElementById('lv').innerText = Math.floor(currentScore/50)+1;

        // อัปเดต Firebase ทันที
        db.ref('players/' + encodeURIComponent(playerName)).update({
            name: playerName,
            score: currentScore,
            level: Math.floor(currentScore/50)+1,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });

        // Effect
        const img = document.getElementById('pop-img');
        img.classList.add('pop-active');
        setTimeout(() => img.classList.remove('pop-active'), 80);
        if (navigator.vibrate) navigator.vibrate(10);
    }

    document.getElementById('saveNameBtn').onclick = () => {
        const input = document.getElementById('playerNameInput');
        const name = input.value.trim();
        
        // กรองชื่อ
        const badWords = ["เหี้ย", "สัส", "ควย", "fuck", "มึง", "กู"];
        if(name.length < 2) return showToast("ชื่อสั้นเกินไป");
        if(badWords.some(w => name.includes(w))) return showToast("❌ กรุณาใช้ชื่อที่สุภาพ");

        playerName = name;
        db.ref('players/' + encodeURIComponent(playerName)).once('value', s => {
            currentScore = s.exists() ? s.val().score : 0;
            document.getElementById('score').innerText = currentScore.toLocaleString();
            document.getElementById('lv').innerText = Math.floor(currentScore/50)+1;
            
            showToast("🎮 ยินดีต้อนรับคุณ " + playerName);
            input.disabled = true;
            document.getElementById('saveNameBtn').innerHTML = '<i class="fas fa-play"></i> กำลังเล่นอยู่...';
            document.getElementById('saveNameBtn').style.background = "#64748b";
        });
    };

    // ลีดเดอร์บอร์ด
    db.ref('players').on('value', (snap) => {
        const data = [];
        snap.forEach(c => { data.push(c.val()); });
        data.sort((a,b) => b.score - a.score);
        
        let html = '';
        data.slice(0, 10).forEach((p, i) => {
            html += `<div class="rank-item" style="${p.name === playerName ? 'background:#f0fdf4' : ''}">
                <span><b>${i+1}.</b> ${p.name} <small style="color:#94a3b8">Lv.${p.level || 1}</small></span>
                <span class="pts">${p.score.toLocaleString()} <i class="fas fa-bolt"></i></span>
            </div>`;
        });
        document.getElementById('rank-list').innerHTML = html || '<div style="padding:10px;">ยังไม่มีผู้เล่น</div>';
    });

    function showToast(m) {
        let t = document.createElement('div'); t.className = 'toast-msg';
        t.innerText = m; document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    document.getElementById('pop-img').onclick = addScore;
</script>
</body>
</html>
