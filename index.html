<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>อุทยานป็อบ · UTTAYAN POP พร้อมเสียง</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e8 100%);
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.97);
            max-width: 460px;
            width: 100%;
            border-radius: 48px;
            padding: 28px 24px 36px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
        }
        .logo {
            width: 72px;
            margin-bottom: 8px;
        }
        h1 {
            background: linear-gradient(135deg, #1a5d1a, #3b8b3b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 32px;
        }
        .badge {
            background: #f0fdf4;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            margin-top: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin: 28px 0 20px;
        }
        .stat-card {
            background: #f0fdf4;
            padding: 16px;
            border-radius: 32px;
        }
        .stat-card div {
            font-size: 32px;
            font-weight: 800;
            color: #1a5d1a;
        }
        #pop-img {
            width: 220px;
            cursor: pointer;
            filter: drop-shadow(0 14px 18px rgba(0, 0, 0, 0.2));
            transition: transform 0.08s cubic-bezier(0.2, 1.6, 0.5, 1);
        }
        .pop-active {
            transform: scale(0.88) rotate(3deg) !important;
        }
        .tap-hint {
            background: #f9f3e0;
            display: inline-block;
            margin-top: 16px;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
        }
        .leaderboard-section {
            margin-top: 32px;
            text-align: left;
        }
        .leaderboard-section h3 {
            border-left: 5px solid #1a5d1a;
            padding-left: 16px;
            margin-bottom: 16px;
        }
        .rank-list {
            background: #ffffffdd;
            border-radius: 28px;
            overflow: hidden;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #e9f0e9;
        }
        .rank-item .pts {
            background: #eaf5ea;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 700;
            color: #1a5d1a;
        }
        .sound-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a5d1a;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            white-space: nowrap;
        }
        .unlock-btn {
            background: #fbbf24;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
        }
        .footer-note {
            font-size: 10px;
            text-align: center;
            margin-top: 24px;
            color: #688f68;
        }
        @media (max-width: 460px) {
            #pop-img { width: 180px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <header>
        <img src="https://uskofficial.github.io/UTTAYANHeartNewSeedCamp/assets/img/logo.png" class="logo" alt="logo" onerror="this.src='https://i.postimg.cc/WztgWSpc/IMG-7790.png'">
        <h1>อุทยานป็อบ</h1>
        <div class="badge">
            <i class="fas fa-tree"></i> UTTAYAN POP 
            <i class="fas fa-volume-up" id="soundStatusIcon"></i>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><small>ระดับเลเวล</small><div id="lv">1</div></div>
        <div class="stat-card"><small>คะแนนรวม</small><div id="score">0</div></div>
    </div>

    <div class="game-box">
        <img src="https://i.postimg.cc/WztgWSpc/IMG-7790.png" id="pop-img" draggable="false" alt="ป๊อป">
    </div>
    <div class="tap-hint">
        <i class="fas fa-hand-peace"></i> กดที่รูปเพื่อเพิ่มคะแนน! 
        <i class="fas fa-fire"></i> <span style="background:#ffe0b5; border-radius:30px; padding:2px 8px;">🔊 มีเสียง</span>
    </div>
    <button class="unlock-btn" id="unlockSoundBtn"><i class="fas fa-play-circle"></i> เปิดเสียง / เริ่มเล่น</button>

    <div class="leaderboard-section">
        <h3><i class="fas fa-trophy"></i> อันดับนักกดสูงสุด</h3>
        <div id="rank-list" class="rank-list"><div class="loading">กำลังโหลด...</div></div>
    </div>
    <div class="footer-note">อัปเดตเรียลไทม์ • กดเยอะ เลเวลพุ่ง!</div>
</div>

<script>
    // -------------------- FIREBASE --------------------
    const firebaseConfig = {
        apiKey: "AIzaSyDXVXeobHQE_MrUcfyvK-G16gtGa8bdEHc",
        authDomain: "uttayanpop.firebaseapp.com",
        databaseURL: "https://uttayanpop-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "uttayanpop",
        storageBucket: "uttayanpop.firebasestorage.app",
        messagingSenderId: "740525391264",
        appId: "1:740525391264:web:4ab7ddafb1ad75d4aab8c5"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // -------------------- ระบบเสียง (HTML5 Audio + Base64) --------------------
    // เสียงป๊อปแบบสั้น ใช้ Web Audio API สร้างเสียง pop จริงจัง (แน่นอน)
    let audioContext = null;
    let soundUnlocked = false;
    let soundEnabled = true;

    function initAudioContext() {
        if (audioContext) return audioContext;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            return audioContext;
        } catch(e) {
            console.warn("Web Audio not supported");
            soundEnabled = false;
            return null;
        }
    }

    // ฟังก์ชันเล่นเสียงป๊อปสั้น แน่นอน
    function playPopSound() {
        if (!soundEnabled) return;
        let ctx = initAudioContext();
        if (!ctx) return;
        
        // ถ้ายังไม่ unlock หรือ context ถูก suspend ให้ลอง resume ก่อน แต่เราจะเรียก unlock ก่อนเล่นจริง
        if (ctx.state === 'suspended') {
            ctx.resume().then(() => {
                actuallyGeneratePop(ctx);
            }).catch(e => console.log("resume fail", e));
        } else if (ctx.state === 'running') {
            actuallyGeneratePop(ctx);
        }
    }
    
    function actuallyGeneratePop(ctx) {
        if (!ctx || ctx.state !== 'running') return;
        const now = ctx.currentTime;
        // สร้างเสียง "ป็อป" ด้วย oscillator + noise
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.type = 'sine';
        osc.frequency.value = 880;
        osc.frequency.exponentialRampToValue(400, 0.1);
        gain.gain.value = 0.3;
        gain.gain.exponentialRampToValue(0.0001, 0.15);
        osc.start();
        osc.stop(now + 0.15);
        
        // เพิ่ม noise สั้น ๆ
        const bufferSize = 2048;
        const noiseNode = ctx.createScriptProcessor(bufferSize, 1, 1);
        noiseNode.onaudioprocess = function(e) {
            const output = e.outputBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = (Math.random() * 2 - 1) * 0.1;
            }
            noiseNode.disconnect();
        };
        const noiseGain = ctx.createGain();
        noiseGain.gain.value = 0.15;
        noiseGain.gain.exponentialRampToValue(0.0001, 0.1);
        noiseNode.connect(noiseGain);
        noiseGain.connect(ctx.destination);
        if (noiseNode.start) noiseNode.start(now);
        setTimeout(() => {
            try { noiseNode.disconnect(); } catch(e) {}
        }, 100);
    }
    
    // ฟังก์ชัน unlock เสียง (ต้องเรียกจากปุ่มหรือการแตะครั้งแรก)
    function unlockSound() {
        if (soundUnlocked) return true;
        let ctx = initAudioContext();
        if (!ctx) {
            soundUnlocked = true; // fallback
            return true;
        }
        if (ctx.state === 'suspended') {
            ctx.resume().then(() => {
                soundUnlocked = true;
                updateSoundIcon(true);
                showToast("🔊 เปิดเสียงสำเร็จ! กดรูปได้เลย");
                // เล่นเสียงตัวอย่างสั้น ๆ ให้รู้ว่าใช้งานได้
                setTimeout(() => playPopSound(), 50);
            }).catch(e => {
                console.log("resume error", e);
                soundUnlocked = false;
            });
        } else if (ctx.state === 'running') {
            soundUnlocked = true;
            updateSoundIcon(true);
            showToast("✅ เสียงพร้อมใช้งาน");
            return true;
        }
        return soundUnlocked;
    }
    
    function updateSoundIcon(isOn) {
        const icon = document.getElementById('soundStatusIcon');
        if (icon) {
            if (isOn) icon.innerHTML = '<i class="fas fa-volume-up" style="color:#2e7d2e;"></i>';
            else icon.innerHTML = '<i class="fas fa-volume-mute" style="color:#b91c1c;"></i>';
        }
    }
    
    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'sound-toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // -------------------- เกมหลัก --------------------
    let currentScore = 0;
    let currentLevel = 1;
    let playerName = "";
    const popImg = document.getElementById('pop-img');
    
    function calcLevel(score) { return Math.floor(score / 50) + 1; }
    
    function updateUI() {
        document.getElementById('score').innerText = currentScore.toLocaleString();
        document.getElementById('lv').innerText = currentLevel;
    }
    
    function syncToFirebase() {
        if (!playerName) return;
        const ref = db.ref('players/' + encodeURIComponent(playerName));
        ref.set({ name: playerName, score: currentScore, level: currentLevel, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }
    
    function triggerAnimation() {
        popImg.classList.add('pop-active');
        setTimeout(() => popImg.classList.remove('pop-active'), 100);
        popImg.style.transform = "scale(0.92)";
        setTimeout(() => { if (!popImg.classList.contains('pop-active')) popImg.style.transform = ""; }, 80);
    }
    
    // ฟังก์ชันกดหลัก
    function onPopClick(e) {
        if (e) e.preventDefault();
        
        // สำคัญ: ถ้ายังไม่ unlock เสียง ให้ unlock ก่อน แต่ยังให้เพิ่มคะแนนได้ (ไม่ปิดกั้นการเล่น)
        if (!soundUnlocked) {
            unlockSound(); // พยายามเปิดเสียง แต่ไม่บล็อคการนับคะแนน
        } else {
            playPopSound(); // เล่นเสียง
        }
        
        // เพิ่มคะแนน
        currentScore += 1;
        currentLevel = calcLevel(currentScore);
        updateUI();
        triggerAnimation();
        syncToFirebase();
        if (navigator.vibrate) navigator.vibrate(8);
    }
    
    // -------------------- Firebase Leaderboard --------------------
    function loadLeaderboard() {
        const ref = db.ref('players').orderByChild('score').limitToLast(10);
        ref.on('value', (snap) => {
            let players = [];
            snap.forEach(child => {
                let p = child.val();
                if (p && typeof p.score === 'number') players.push(p);
            });
            players.sort((a,b) => b.score - a.score);
            const container = document.getElementById('rank-list');
            if (!players.length) {
                container.innerHTML = '<div class="loading">ยังไม่มีผู้เล่น</div>';
                return;
            }
            let html = '';
            players.forEach((p, idx) => {
                let medal = idx===0 ? '<i class="fas fa-crown" style="color:#f59e0b;"></i>' : (idx===1 ? '<i class="fas fa-medal" style="color:#a0a0a0;"></i>' : (idx===2 ? '<i class="fas fa-medal" style="color:#cd7f32;"></i>' : `${idx+1}`));
                html += `<div class="rank-item"><span class="name">${medal} ${p.name.slice(0,18)} Lv.${p.level||Math.floor(p.score/50)+1}</span><span class="pts">${p.score.toLocaleString()}</span></div>`;
            });
            container.innerHTML = html;
        });
    }
    
    // -------------------- ขอชื่อผู้เล่น + โหลดข้อมูลเก่า --------------------
    function askPlayerName() {
        let name = prompt("✨ กรุณาใส่ชื่อของคุณ เพื่อเริ่มบันทึกคะแนน ✨", "นักท่องอุทยาน");
        if (!name || name.trim() === "") name = "นักกดป๊อป_" + Math.floor(Math.random()*1000);
        playerName = name.trim().substring(0, 24);
        if (playerName === "") playerName = "นักกดPOP";
        
        const playerRef = db.ref('players/' + encodeURIComponent(playerName));
        playerRef.once('value').then(snap => {
            const data = snap.val();
            if (data && typeof data.score === 'number') {
                currentScore = data.score;
                currentLevel = calcLevel(currentScore);
                updateUI();
                showToast(`👋 กลับมาแล้ว ${playerName} คะแนน ${currentScore.toLocaleString()}`);
            } else {
                currentScore = 0;
                currentLevel = 1;
                updateUI();
                showToast(`✨ ยินดีต้อนรับ ${playerName} ✨`);
            }
            syncToFirebase();
        }).catch(() => {
            currentScore = 0;
            updateUI();
            syncToFirebase();
        });
    }
    
    // -------------------- ผูก Events --------------------
    function bindEvents() {
        // กดที่รูป
        popImg.addEventListener('click', onPopClick);
        popImg.addEventListener('touchstart', onPopClick, { passive: false });
        popImg.addEventListener('dragstart', (e) => e.preventDefault());
        
        // ปุ่ม unlock เสียงโดยเฉพาะ
        const unlockBtn = document.getElementById('unlockSoundBtn');
        if (unlockBtn) {
            unlockBtn.addEventListener('click', (e) => {
                e.preventDefault();
                unlockSound();
            });
        }
        
        // ป้องกันเมนู
        window.addEventListener('contextmenu', (e) => { if (e.target === popImg) e.preventDefault(); });
    }
    
    // เริ่มต้นเมื่อโหลดเสร็จ
    window.onload = () => {
        bindEvents();
        askPlayerName();
        loadLeaderboard();
        
        // อัปเดต Firebase ซ้ำทุก 5 วิ
        setInterval(() => { if (playerName) syncToFirebase(); }, 5000);
        
        // แสดงไอคอน mute ก่อน unlock
        updateSoundIcon(false);
        
        // เตรียม audio context ล่วงหน้า (แต่ยังไม่ resume)
        initAudioContext();
        
        // แจ้งเตือนให้กดปุ่มเปิดเสียง
        setTimeout(() => {
            if (!soundUnlocked) {
                showToast("🎵 กดปุ่ม 'เปิดเสียง' ด้านล่างเพื่อเปิดเสียงป๊อป");
            }
        }, 500);
    };
</script>
</body>
</html>
