    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e8 100%);
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.97);
            max-width: 460px;
            width: 100%;
            border-radius: 48px;
            padding: 24px 20px 28px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);

        }
        .logo {
            width: 60px;
            margin-bottom: 6px;
        }
        .title-container {
            margin: 5px 0 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .title-image {
            width: 100%;
            max-width: 380px;

            filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.12));
        }
        .badge {
            background: #f0fdf4;

            border-radius: 40px;
            font-size: 11px;

        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;

        }
        .stat-card {
            background: #f0fdf4;
            padding: 12px 8px;
            border-radius: 28px;
        }
        .stat-card small {
            color: #475569;
            font-size: 12px;
        }
        .stat-card div {
            font-size: 28px;
            font-weight: 800;

            word-break: break-word;
        }
        #pop-img {
            width: 180px;
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
            transition: transform 0.06s cubic-bezier(0.2, 1.6, 0.5, 1);
        }
        #pop-img.disabled {
            cursor: not-allowed;
            opacity: 0.6;

        }
        #pop-img.banned-mode {

        .tap-hint {

        .name-input-section {

        }
        .name-input-section label {
            font-size: 12px;

        .name-input-section input {

        .trophy-gold { color: #fbbf24; font-size: 16px; }
        .trophy-silver { color: #9ca3af; font-size: 16px; }
        .trophy-bronze { color: #cd7f32; font-size: 16px; }
        
        .congrats-pop {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);

            font-weight: bold;
            padding: 8px 20px;

            font-size: 18px;
            font-family: 'Kanit', sans-serif;
            white-space: nowrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: popFly 0.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes popFly {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5); bottom: 15%; }
            20% { opacity: 1; transform: translateX(-50%) scale(1.1); }
            80% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(0.8); bottom: 30%; display: none; }
        }
        
        .show-more-btn {
            background: none;
            border: none;
            color: #1a5d1a;
            font-size: 12px;
            font-family: 'Kanit', sans-serif;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-top: 1px dashed #cbe5cb;
            margin-top: 4px;
            transition: 0.1s;
        }
        .show-more-btn:active {
            background: #e8f5e9;
            border-radius: 0 0 24px 24px;
        }
        
        .fair-play-footer {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px dashed #cbe5cb;
            font-size: 10px;
            color: #b45309;
            text-align: center;
            background: #fef9e3;
            border-radius: 20px;
            padding: 10px 12px;
        }
        
        .footer-note {
            font-size: 9px;
            text-align: center;
            margin-top: 12px;
            color: #688f68;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a5d1a;
            color: #fef9c3;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1000;
            white-space: nowrap;
            font-weight: 500;
        }
        .toast-msg.error {
            background: #dc2626;
        }
        .online-status {
            font-size: 9px;
            color: #16a34a;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        @media (max-width: 460px) {
            #pop-img { width: 150px; }
            .main-card { padding: 20px 16px 24px; }
            .rank-item .pts { font-size: 10px; white-space: normal; word-break: break-word; }
            .title-image { max-width: 300px; }
            .congrats-pop { font-size: 14px; padding: 6px 16px; white-space: nowrap; }
            .stat-card div { font-size: 22px; }
        }
    </style>
</head>
<body>

<script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDXVXeobHQE_MrUcfyvK-G16gtGa8bdEHc",
        authDomain: "uttayanpop.firebaseapp.com",
        databaseURL: "https://uttayanpop-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "uttayanpop",
        storageBucket: "uttayanpop.firebasestorage.app",
        messagingSenderId: "740525391264",
        appId: "1:740525391264:web:4ab7ddafb1ad75d4aab8c5"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    
    // ==================== ระบบจัดการคำไม่เหมาะสม ====================
    const inappropriateWords = ["เหี้ย", "สัส", "ควย", "fuck", "shit", "ยาบ้า", "ส้นตีน", "กระจอก", "สัด", "ไอ้", "มึง", "กู", "เหรีย", "สลบ", "ชาติช้าง"];
    
    function isInappropriateName(name) {
        if (!name || name.trim() === "") return true;
        let checkName = name.trim().toLowerCase();
        for (let badWord of inappropriateWords) {
            if (checkName.includes(badWord)) return true;
        }
        return false;
    }
    
    function sanitizeName(name) {
        let clean = name.trim().replace(/[^\u0E00-\u0E7Fa-zA-Z0-9\s]/g, '');
        return clean.substring(0, 24) || "นักท่องอุทยาน";
    }
    
    // ==================== ANTI-CHEAT SYSTEM ====================
    // ตัวแปรป้องกันการโกง
    let clickTimestamps = []; // เก็บเวลาที่กดล่าสุด (Unix timestamp milliseconds)
    let clickCountsPerSecond = []; // เก็บจำนวนครั้งต่อวินาที
    let isBanned = false;
    let banExpiryTime = 0;
    let lastClickTime = 0;
    const MIN_CLICK_INTERVAL = 300; // กดถี่สุด 300ms (3.3 ครั้ง/วินาที) - ป้องกันบอท
    const MAX_CLICKS_PER_SECOND = 4; // เกิน 4 ครั้ง/วินาที = ผิดปกติ
    const BAN_DURATION_NORMAL = 5 * 60 * 1000; // แบน 5 นาที
    const BAN_DURATION_SEVERE = 30 * 60 * 1000; // แบบรุนแรง 30 นาที
    
    let suspiciousActivityCount = 0; // นับจำนวนครั้งที่ทำผิดกฎ
    let lastSuspiciousTime = 0;
    
    // ฟังก์ชันตรวจจับพฤติกรรมบอท/แมโคร
    function isCheatingBehavior() {
        const now = Date.now();
        
        // 1. ตรวจจับความถี่ในการกด (rate limiting)
        if (lastClickTime > 0) {
            const timeDiff = now - lastClickTime;
            if (timeDiff < MIN_CLICK_INTERVAL) {
                // กดเร็วเกินไป (เหมือนบอทกด)
                logSuspiciousActivity("SPEED_CLICK", `กดห่างกัน ${timeDiff}ms (ต่ำกว่า ${MIN_CLICK_INTERVAL}ms)`);
                return true;
            }
        }
        
        // 2. ตรวจจับจำนวนครั้งใน 1 วินาทีที่ผ่านมา
        // ทำความสะอาด timestamp ที่เก่ากว่า 1 วินาที
        while (clickTimestamps.length > 0 && clickTimestamps[0] < now - 1000) {
            clickTimestamps.shift();
        }
        
        // ถ้ามีกดเกิน 4 ครั้งใน 1 วินาที = ถือว่าโกง
        if (clickTimestamps.length >= MAX_CLICKS_PER_SECOND) {
            logSuspiciousActivity("HIGH_FREQUENCY", `กด ${clickTimestamps.length + 1} ครั้งใน 1 วินาที (เกิน ${MAX_CLICKS_PER_SECOND})`);
            return true;
        }
        
        // 3. ตรวจจับรูปแบบการกดที่สม่ำเสมอเกินไป (บอท)
        if (clickTimestamps.length >= 5) {
            // คำนวณความแปรปรวนของช่วงเวลา
            let intervals = [];
            for (let i = 1; i < clickTimestamps.length; i++) {
                intervals.push(clickTimestamps[i] - clickTimestamps[i-1]);
            }
            
            // ถ้าช่วงเวลาเกือบเท่ากันทุกครั้ง (ความแปรปรวนน้อยมาก) = บอท
            let avgInterval = intervals.reduce((a,b) => a+b, 0) / intervals.length;
            let variance = intervals.map(i => Math.pow(i - avgInterval, 2)).reduce((a,b) => a+b, 0) / intervals.length;
            
            // ถ้าความแปรปรวนน้อยกว่า 5ms และทุกช่วงห่างกันระหว่าง 250-350ms = บอทชัดเจน
            if (variance < 10 && intervals.every(i => i > 200 && i < 400)) {
                logSuspiciousActivity("BOT_PATTERN", `ช่วงเวลาสม่ำเสมอเกินไป (variance:${variance.toFixed(2)}ms)`);
                return true;
            }
        }
        
        return false;
    }
    
    // บันทึกพฤติกรรมที่น่าสงสัย
    function logSuspiciousActivity(type, details) {
        if (!playerName) return;
        
        const now = Date.now();
        suspiciousActivityCount++;
        lastSuspiciousTime = now;
        
        // บันทึกลง Firebase (สำหรับ admin ตรวจสอบ)
        const logRef = db.ref('cheat_logs/' + encodeURIComponent(playerName + "_" + now));
        logRef.set({
            playerName: playerName,
            type: type,
            details: details,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            currentScore: currentScore
        }).catch(e => console.error("Log error:", e));
        
        console.warn(`⚠️ ผู้เล่น ${playerName} พฤติกรรมผิดปกติ: ${type} - ${details}`);
        
        // ถ้าผิดปกติมากกว่า 3 ครั้ง หรือเป็น HIGH_FREQUENCY ให้แบทันที
        if (suspiciousActivityCount >= 3 || type === "HIGH_FREQUENCY" || type === "BOT_PATTERN") {
            applyBan(type === "HIGH_FREQUENCY" || type === "BOT_PATTERN" ? "SEVERE" : "NORMAL");
        }
    }
    
    // ฟังก์ชันแบนผู้เล่น
    async function applyBan(severity = "NORMAL") {
        if (isBanned) return;
        
        const banDuration = severity === "SEVERE" ? BAN_DURATION_SEVERE : BAN_DURATION_NORMAL;
        banExpiryTime = Date.now() + banDuration;
        isBanned = true;
        
        // บันทึกสถานะแบนลง Firebase
        if (playerName) {
            const banRef = db.ref('banned_players/' + encodeURIComponent(playerName));
            banRef.set({
                name: playerName,
                bannedAt: firebase.database.ServerValue.TIMESTAMP,
                expiresAt: banExpiryTime,
                reason: severity === "SEVERE" ? "กดเร็วเกินไป/รูปแบบบอท" : "พฤติกรรมผิดปกติซ้ำๆ",
                severity: severity
            });
            
            // อัปเดตสถานะผู้เล่น
            const playerRef = db.ref('players/' + encodeURIComponent(playerName));
            playerRef.update({
                isBanned: true,
                banExpiry: banExpiryTime,
                banReason: severity === "SEVERE" ? "SPEED_CHEAT" : "SUSPICIOUS"
            });
        }
        
        setGameEnabled(false);
        popImg.classList.add('banned-mode');
        const minutes = Math.floor(banDuration / 60000);
        warningText.innerHTML = `<i class="fas fa-ban"></i> 🚫 ถูกแบน ${minutes} นาที! เหตุผล: ตรวจจับการกดผิดปกติ (${severity === "SEVERE" ? "ความเร็วผิดปกติ" : "พฤติกรรมต้องสงสัย"})`;
        warningText.className = "warning-text banned";
        tapHint.innerHTML = `<i class="fas fa-hourglass-half"></i> ถูกแบนชั่วคราว ${minutes} นาที กรุณารอแล้วเริ่มใหม่`;
        
        showToast(`🚫 ถูกแบน ${minutes} นาที! เนื่องจากตรวจพบการกดที่ผิดปกติ`, 4000, true);
        
        // ตั้งเวลาปลดแบน
        setTimeout(() => {
            if (isBanned && Date.now() >= banExpiryTime) {
                unbanPlayer();
            }
        }, banDuration);
    }
    
    function unbanPlayer() {
        isBanned = false;
        suspiciousActivityCount = 0;
        clickTimestamps = [];
        lastClickTime = 0;
        
        if (playerName) {
            const banRef = db.ref('banned_players/' + encodeURIComponent(playerName));
            banRef.remove();
            
            const playerRef = db.ref('players/' + encodeURIComponent(playerName));
            playerRef.update({
                isBanned: false,
                banExpiry: null,
                banReason: null
            });
        }
        
        popImg.classList.remove('banned-mode');
        setGameReadyAfterUnban();
        warningText.innerHTML = `<i class="fas fa-check-circle"></i> ปลดแบนแล้ว! กรุณาเล่นอย่างสุภาพ`;
        warningText.className = "warning-text success";
        tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กดที่รูปเพื่อเพิ่มคะแนน (กดช้าลงหน่อยนะ) <i class="fas fa-heart"></i>';
        
        showToast("✅ ปลดแบนแล้ว! กรุณาเล่นอย่างเหมาะสม", 2000);
    }
    
    function setGameReadyAfterUnban() {
        if (playerName && !isBanned) {
            setGameEnabled(true);
        }
    }
    
    // ==================== ตัวแปรหลักเกม ====================
    let currentScore = 0;
    let currentLevel = 1;
    let playerName = "";
    let isGameReady = false;
    let showFullRank = false;
    let allPlayers = [];
    let congratsShownTime = {}; 
    
    const popImg = document.getElementById('pop-img');
    const scoreEl = document.getElementById('score');
    const lvEl = document.getElementById('lv');
    const playerNameInput = document.getElementById('playerNameInput');
    const saveNameBtn = document.getElementById('saveNameBtn');
    const currentUserDisplay = document.getElementById('currentUserDisplay');
    const tapHint = document.getElementById('tapHint');
    const warningText = document.getElementById('warningText');
    const rankContainer = document.getElementById('rank-list');
    const onlineStatus = document.getElementById('onlineStatus');
    
    function calcLevel(score) { return Math.floor(score / 50) + 1; }
    
    function updateUI() {
        scoreEl.innerText = currentScore.toLocaleString('en-US');
        lvEl.innerText = currentLevel;
        if (playerName && !isBanned) {
            currentUserDisplay.innerHTML = `<i class="fas fa-user-check"></i> กำลังเล่น: ${playerName} (${currentScore.toLocaleString()} คะแนน)`;
            currentUserDisplay.style.display = "inline-block";
        } else if (isBanned) {
            currentUserDisplay.innerHTML = `<i class="fas fa-ban"></i> ${playerName} (ถูกแบนชั่วคราว)`;
            currentUserDisplay.style.display = "inline-block";
            currentUserDisplay.style.background = "#fee2e2";
            currentUserDisplay.style.color = "#dc2626";
        }
    }
    
    function setGameEnabled(enabled) {
        isGameReady = enabled;
        if (enabled && !isBanned) {
            popImg.classList.remove('disabled');
            popImg.classList.remove('banned-mode');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กดที่รูปเพื่อเพิ่มคะแนน! (กดช้าๆ นะ) <i class="fas fa-heart"></i>';
            warningText.innerHTML = '<i class="fas fa-check-circle"></i> กำลังเล่นด้วยชื่อ: ' + playerName;
            warningText.className = "warning-text success";
        } else if (isBanned) {
            popImg.classList.add('disabled');
            popImg.classList.add('banned-mode');
        } else {
            popImg.classList.add('disabled');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กรอกชื่อที่สุภาพเพื่อเริ่มเล่น!';
        }
    }
    
    // อัปเดตคะแนนไป Firebase
    function syncScoreToFirebase() {
        if (!playerName || isBanned) return;
        
        const playerRef = db.ref('players/' + encodeURIComponent(playerName));
        const newScore = currentScore;
        const newLevel = currentLevel;
        
        playerRef.update({
            name: playerName,
            score: newScore,
            level: newLevel,
            isBanned: isBanned || false,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).catch(err => {
            console.error("อัปเดต Firebase ล้มเหลว:", err);
        });
    }
    
    function loadPlayerScoreFromFirebase() {
        if (!playerName) return;
        
        // ตรวจสอบสถานะแบนก่อน
        const banRef = db.ref('banned_players/' + encodeURIComponent(playerName));
        banRef.once('value').then((banSnap) => {
            if (banSnap.exists()) {
                const banData = banSnap.val();
                if (banData.expiresAt && banData.expiresAt > Date.now()) {
                    isBanned = true;
                    banExpiryTime = banData.expiresAt;
                    setGameEnabled(false);
                    popImg.classList.add('banned-mode');
                    const remainingMin = Math.ceil((banExpiryTime - Date.now()) / 60000);
                    warningText.innerHTML = `<i class="fas fa-ban"></i> 🚫 ถูกแบน ${remainingMin} นาที!`;
                    warningText.className = "warning-text banned";
                    tapHint.innerHTML = `<i class="fas fa-hourglass-half"></i> ถูกแบนชั่วคราว`;
                    updateUI();
                    
                    // ตั้งเวลาปลดแบน
                    setTimeout(() => {
                        if (isBanned && Date.now() >= banExpiryTime) unbanPlayer();
                    }, Math.max(0, banExpiryTime - Date.now()));
                    return;
                } else {
                    // แบนหมดอายุแล้ว ลบออก
                    banRef.remove();
                }
            }
            
            // โหลดคะแนนปกติ
            const playerRef = db.ref('players/' + encodeURIComponent(playerName));
            playerRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                if (data && typeof data.score === 'number' && data.score !== undefined) {
                    currentScore = data.score;
                    currentLevel = calcLevel(currentScore);
                } else {
                    currentScore = 0;
                    currentLevel = 1;
                    syncScoreToFirebase();
                }
                updateUI();
                setGameEnabled(true);
                showToast(`สวัสดี ${playerName}! กดช้าๆ นะ`, 1500);
            }).catch(err => {
                console.error("โหลดข้อมูลผิดพลาด:", err);
                currentScore = 0;
                currentLevel = 1;
                updateUI();
                setGameEnabled(true);
            });
        });
    }
    
    function showCongratsForRankOne(rankOneName) {
        if (!rankOneName) return;
        const now = Date.now();
        const lastShown = congratsShownTime[rankOneName] || 0;
        if (lastShown && (now - lastShown) < 180000) return;
        congratsShownTime[rankOneName] = now;
        
        const popDiv = document.createElement('div');
        popDiv.className = 'congrats-pop';
        popDiv.innerHTML = `<i class="fas fa-crown" style="color:#f59e0b;"></i> 🎉 พุ่ง! ${rankOneName} ครองอันดับ 1 🚀`;
        document.body.appendChild(popDiv);
        setTimeout(() => {
            if(popDiv && popDiv.remove) popDiv.remove();
        }, 1200);
    }
    
    function listenLeaderboard() {
        db.ref('players').on('value', (snapshot) => {
            const players = [];
            snapshot.forEach(child => {
                const p = child.val();
                if (p && p.name && typeof p.score === 'number') {
                    players.push(p);
                }
            });
            players.sort((a,b) => b.score - a.score);
            allPlayers = players;
            renderLeaderboard();
            
            if (allPlayers.length > 0) {
                const rankOne = allPlayers[0];
                if (rankOne && rankOne.name) showCongratsForRankOne(rankOne.name);
            }
        });
    }
    
    function renderLeaderboard() {
        if (allPlayers.length === 0) {
            rankContainer.innerHTML = '<div style="padding:16px; text-align:center; color:#688f68; font-size:12px;">🎮 รอผู้เล่นคนแรก...</div>';
            return;
        }
        let html = '';
        const limit = showFullRank ? allPlayers.length : 5;
        for (let i = 0; i < Math.min(limit, allPlayers.length); i++) {
            const p = allPlayers[i];
            const isMe = (p.name === playerName);
            const isBannedPlayer = p.isBanned === true;
            let trophyHtml = '';
            if (i === 0) trophyHtml = '<i class="fas fa-crown trophy-gold"></i>';
            else if (i === 1) trophyHtml = '<i class="fas fa-medal trophy-silver"></i>';
            else if (i === 2) trophyHtml = '<i class="fas fa-medal trophy-bronze"></i>';
            
            const displayScore = p.score.toLocaleString('en-US');
            const bannedBadge = isBannedPlayer ? ' <span style="color:#dc2626;">🚫</span>' : '';
            
            html += `
                <div class="rank-item ${isBannedPlayer ? 'banned-user' : ''}" style="${isMe ? 'background:#e8f5e9;' : ''}">
                    <span class="name">
                        <b>${i+1}.</b> 
                        ${trophyHtml} 
                        ${p.name}${bannedBadge} <small>Lv.${p.level}</small>
                    </span>
                    <span class="pts">${displayScore} <i class="fas fa-bolt"></i></span>
                </div>
            `;
        }
        if (allPlayers.length > 5) {
            html += `<button class="show-more-btn" onclick="window.toggleRank()">${showFullRank ? '▲ ย่อหน้าต่าง' : '▼ ดูทั้งหมด ' + allPlayers.length + ' คน'}</button>`;
        }
        rankContainer.innerHTML = html;
    }

    window.toggleRank = function() { 
        showFullRank = !showFullRank; 
        renderLeaderboard(); 
    };
    
    // ฟังก์ชันกดเพิ่มคะแนน - พร้อมระบบ Anti-Cheat
    function addScore() {
        if (!isGameReady || isBanned) {
            if (isBanned) showToast("คุณถูกแบนชั่วคราว กรุณารอสักครู่", 1500, true);
            else showToast("กรอกชื่อก่อนนะ!", 1000, true);
            return;
        }
        
        const now = Date.now();
        
        // ตรวจจับการโกงก่อน
        if (isCheatingBehavior()) {
            return; // ถ้าตรวจจับได้ จะไม่เพิ่มคะแนนและแบนอัตโนมัติ
        }
        
        // บันทึกเวลาในการกด
        clickTimestamps.push(now);
        lastClickTime = now;
        
        // เพิ่มคะแนนทันที
        currentScore++;
        currentLevel = calcLevel(currentScore);
        updateUI();
        
        // อัปเดต Firebase (แบบไม่ต้องรอ)
        syncScoreToFirebase();
        
        // เอฟเฟกต์กด
        popImg.classList.add('pop-active');
        setTimeout(() => popImg.classList.remove('pop-active'), 80);
        
        // สั่นถ้ารองรับ (เบาๆ)
        if (navigator.vibrate) navigator.vibrate(8);
        
        // ทำความสะอาด timestamps ที่เก่าเกินไป (ป้องกัน memory leak)
        if (clickTimestamps.length > 30) {
            const cutoff = now - 5000;
            clickTimestamps = clickTimestamps.filter(t => t > cutoff);
        }
    }
    
    function savePlayerName() {
        let name = playerNameInput.value.trim();
        if (isInappropriateName(name)) {
            showToast("❌ ชื่อไม่สุภาพ กรุณาใช้ชื่อที่เหมาะสม!", 2000, true);
            return;
        }
        if (name === "") {
            showToast("❌ กรุณากรอกชื่อด้วยค่ะ/ครับ!", 1500, true);
            return;
        }
        
        playerName = sanitizeName(name);
        
        // รีเซ็ตตัวแปร Anti-Cheat
        isBanned = false;
        suspiciousActivityCount = 0;
        clickTimestamps = [];
        lastClickTime = 0;
        
        setGameEnabled(false);
        loadPlayerScoreFromFirebase();
        saveNameBtn.innerHTML = '✏️ เปลี่ยนชื่อ';
        playerNameInput.value = playerName;
    }
    
    function showToast(msg, dur=2000, err=false) {
        let t = document.createElement('div');
        t.className = 'toast-msg' + (err ? ' error' : '');
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), dur);
    }
    
    // ตรวจสอบ connection
    function checkConnection() {
        const connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            if (snap.val() === true) {
                onlineStatus.innerHTML = '<i class="fas fa-circle" style="color:#16a34a; font-size:6px;"></i> เชื่อมต่อออนไลน์ • ระบบป้องกันการโกงทำงาน';
                onlineStatus.style.color = "#16a34a";
            } else {
                onlineStatus.innerHTML = '<i class="fas fa-circle" style="color:#dc2626; font-size:6px;"></i> ออฟไลน์ • ระบบ Anti-Cheat อาจไม่ทำงาน';
                onlineStatus.style.color = "#dc2626";
            }
        });
    }
    
    window.onload = () => {
        // Event listeners
        popImg.addEventListener('click', (e) => { 
            e.preventDefault(); 
            addScore(); 
        });
        popImg.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            addScore(); 
        }, {passive: false});
        
        saveNameBtn.onclick = savePlayerName;
        
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') savePlayerName();
        });
        
        listenLeaderboard();
        checkConnection();
        
        console.log("🛡️ อุทยานป็อบ (Anti-Cheat) พร้อมใช้งาน!");
        console.log("📋 กฎ: กดช้าๆ ไม่เกิน 4 ครั้ง/วินาที, ห้ามใช้บอท/แมโคร");
        console.log("⚠️ ตรวจจับอัตโนมัติ: ความเร็วผิดปกติ, รูปแบบบอท, การกดถี่เกินไป");
    };
</script>
</body>
</html>
