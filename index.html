<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>อุทยานป็อบ · UTTAYAN POP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e8 100%);
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.97);
            max-width: 460px;
            width: 100%;
            border-radius: 48px;
            padding: 24px 20px 28px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
        }
        .logo {
            width: 60px;
            margin-bottom: 6px;
        }

        /* --- ส่วนที่ปรับขนาดรูปภาพหัวข้อให้ใหญ่ขึ้น --- */
        .title-container {
            margin: 5px 0 15px; /* เพิ่มระยะห่างบน-ล่าง */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .title-image {
            width: 100%; /* ให้ยืดตาม container */
            max-width: 380px; /* ปรับความใหญ่สูงสุดตรงนี้ (เพิ่มจากเดิม 240px) */
            height: auto;
            filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.12)); /* เพิ่มเงาให้ดูมีมิติ */
            transition: transform 0.3s ease;
        }
        .title-image:hover {
            transform: scale(1.02); /* ลูกเล่นเวลาเอาเมาส์วางแล้วขยับนิดหน่อย */
        }

        .badge {
            background: #f0fdf4;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            margin-top: 5px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 20px 0 16px;
        }
        .stat-card {
            background: #f0fdf4;
            padding: 12px 8px;
            border-radius: 28px;
        }
        .stat-card small {
            color: #475569;
            font-size: 12px;
        }
        .stat-card div {
            font-size: 28px;
            font-weight: 800;
            color: #1a5d1a;
        }
        #pop-img {
            width: 180px;
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
            transition: transform 0.06s cubic-bezier(0.2, 1.6, 0.5, 1);
        }
        #pop-img.disabled {
            cursor: not-allowed;
            opacity: 0.6;
            filter: grayscale(0.2);
        }
        .pop-active {
            transform: scale(0.85) rotate(3deg) !important;
        }
        .tap-hint {
            background: #f9f3e0;
            display: inline-block;
            margin-top: 12px;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 11px;
            color: #b45309;
        }
        .name-input-section {
            margin: 16px 0 8px;
            text-align: left;
        }
        .name-input-section label {
            font-size: 12px;
            font-weight: 600;
            color: #1a5d1a;
            display: block;
            margin-bottom: 5px;
        }
        .name-input-section input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #cbe5cb;
            border-radius: 40px;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            background: white;
            outline: none;
            transition: 0.2s;
        }
        .name-input-section input:focus {
            border-color: #1a5d1a;
            box-shadow: 0 0 0 3px rgba(26, 93, 26, 0.1);
        }
        .name-input-section input.error {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .save-name-btn {
            background: #1a5d1a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: 'Kanit', sans-serif;
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: 0.1s;
        }
        .save-name-btn:active {
            transform: scale(0.97);
            background: #0f3f0f;
        }
        .current-user {
            background: #e6f7e6;
            padding: 6px 10px;
            border-radius: 40px;
            font-size: 11px;
            margin-top: 8px;
            color: #1a5d1a;
            display: inline-block;
        }
        .warning-text {
            color: #f59e0b;
            font-size: 10px;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .warning-text.success {
            color: #16a34a;
        }
        
        .leaderboard-section {
            margin-top: 16px;
            text-align: left;
        }
        .leaderboard-section h3 {
            border-left: 4px solid #1a5d1a;
            padding-left: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }
        .rank-list {
            background: #ffffffdd;
            border-radius: 24px;
            overflow: hidden;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #e9f0e9;
            font-size: 13px;
        }
        .rank-item:last-child {
            border-bottom: none;
        }
        .rank-item .name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .rank-item .pts {
            background: #eaf5ea;
            padding: 3px 10px;
            border-radius: 40px;
            font-weight: 700;
            color: #1a5d1a;
            font-size: 12px;
        }
        
        .show-more-btn, .hide-more-btn {
            background: none;
            border: none;
            color: #1a5d1a;
            font-size: 12px;
            font-family: 'Kanit', sans-serif;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-top: 1px dashed #cbe5cb;
            margin-top: 4px;
            transition: 0.1s;
        }
        .show-more-btn:active, .hide-more-btn:active {
            background: #e8f5e9;
            border-radius: 0 0 24px 24px;
        }
        
        .fair-play-footer {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px dashed #cbe5cb;
            font-size: 10px;
            color: #b45309;
            text-align: center;
            background: #fef9e3;
            border-radius: 20px;
            padding: 10px 12px;
        }
        
        .footer-note {
            font-size: 9px;
            text-align: center;
            margin-top: 12px;
            color: #688f68;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a5d1a;
            color: #fef9c3;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1000;
            white-space: nowrap;
            font-weight: 500;
        }
        .toast-msg.error {
            background: #dc2626;
        }
        .online-status {
            font-size: 9px;
            color: #16a34a;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        /* การปรับแต่งขนาดสำหรับหน้าจอเล็ก (Responsive) */
        @media (max-width: 460px) {
            #pop-img { width: 150px; }
            .main-card { padding: 20px 16px 24px; }
            .fair-play-footer { font-size: 9px; padding: 8px 10px; }
            .rank-item { padding: 8px 12px; font-size: 12px; }
            .title-image { max-width: 300px; } /* บนมือถือให้เล็กลงมาหน่อยเพื่อไม่ให้ชิดขอบเกินไป */
        }
    </style>
</head>
<body>

<div class="main-card">
    <header>
        <img src="https://uskofficial.github.io/UTTAYANHeartNewSeedCamp/assets/img/logo.png" class="logo" alt="logo" onerror="this.src='https://i.postimg.cc/WztgWSpc/IMG-7790.png'">
        
        <div class="title-container">
            <img src="https://i.postimg.cc/FHrQjZMT/IMG-8866.png" class="title-image" alt="UTTAYAN POP USK">
        </div>

        <div class="badge">
            <i class="fas fa-tree"></i> UTTAYAN POP <i class="fas fa-star"></i>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><small>ระดับเลเวล</small><div id="lv">0</div></div>
        <div class="stat-card"><small>คะแนนรวม</small><div id="score">0</div></div>
    </div>

    <div class="game-box">
        <img src="https://i.postimg.cc/WztgWSpc/IMG-7790.png" id="pop-img" draggable="false" alt="ป๊อป" class="disabled">
    </div>
    <div class="tap-hint" id="tapHint">
        <i class="fas fa-hand-peace"></i> กรอกชื่อที่สุภาพเพื่อเริ่มเล่น! 
        <i class="fas fa-fire"></i>
    </div>

    <div class="name-input-section">
        <label><i class="fas fa-user"></i> ชื่อผู้เล่น</label>
        <input type="text" id="playerNameInput" placeholder="กรุณากรอกชื่อที่สุภาพ" maxlength="24" autocomplete="off">
        <button class="save-name-btn" id="saveNameBtn">▶ บันทึกชื่อและเริ่มเล่น</button>
        <div class="warning-text" id="warningText">
            <i class="fas fa-info-circle"></i> กรอกชื่อเพื่อสะสมคะแนนและแสดงในอันดับ
        </div>
        <div id="currentUserDisplay" class="current-user" style="display: none;"></div>
    </div>

    <div class="leaderboard-section">
        <h3><i class="fas fa-trophy" style="color:#fbbf24;"></i> อันดับนักกดสูงสุด <span style="font-size:10px;">(เรียลไทม์)</span></h3>
        <div id="rank-list" class="rank-list">
            <div style="padding:16px; text-align:center; color:#688f68; font-size:12px;">กำลังโหลดอันดับ...</div>
        </div>
    </div>
    
    <div class="fair-play-footer">
        <i class="fas fa-heart"></i>
        ฟิวแบบไม่ทำเพื่อผลประโยชน์ใดอื่น และไม่โจมตีฝ่ายใด — เล่นเพื่อความสนุกเท่านั้น
        <i class="fas fa-smile-wink"></i>
    </div>
    
    <div class="footer-note">
        <i class="fas fa-globe"></i> อัปเดตเรียลไทม์ทุกคน • กดเยอะ เลเวลพุ่ง!
    </div>
    <div class="online-status" id="onlineStatus">
        <i class="fas fa-circle" style="color:#16a34a; font-size:6px;"></i> เชื่อมต่อออนไลน์
    </div>
</div>

<script>
    // ==================== FIREBASE CONFIG (Sun ใช้ตัวเดิมได้เลยครับ) ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDXVXeobHQE_MrUcfyvK-G16gtGa8bdEHc",
        authDomain: "uttayanpop.firebaseapp.com",
        databaseURL: "https://uttayanpop-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "uttayanpop",
        storageBucket: "uttayanpop.firebasestorage.app",
        messagingSenderId: "740525391264",
        appId: "1:740525391264:web:4ab7ddafb1ad75d4aab8c5"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    
    // ==================== ระบบจัดการคำไม่เหมาะสม ====================
    const inappropriateWords = ["เหี้ย", "สัส", "ควย", "fuck", "shit", "ยาบ้า", "ส้นตีน", "กระจอก"]; // สามารถเพิ่มได้ตามใจครับ
    
    function isInappropriateName(name) {
        if (!name || name.trim() === "") return true;
        let checkName = name.trim().toLowerCase();
        for (let badWord of inappropriateWords) {
            if (checkName.includes(badWord)) return true;
        }
        return false;
    }
    
    function sanitizeName(name) {
        let clean = name.trim().replace(/[^\u0E00-\u0E7Fa-zA-Z0-9\s]/g, '');
        return clean.substring(0, 24) || "นักท่องอุทยาน";
    }
    
    // ==================== Logic ตัวเกม ====================
    let currentScore = 0;
    let currentLevel = 1;
    let playerName = "";
    let isGameReady = false;
    let showFullRank = false;
    let allPlayers = [];
    
    const popImg = document.getElementById('pop-img');
    const scoreEl = document.getElementById('score');
    const lvEl = document.getElementById('lv');
    const playerNameInput = document.getElementById('playerNameInput');
    const saveNameBtn = document.getElementById('saveNameBtn');
    const currentUserDisplay = document.getElementById('currentUserDisplay');
    const tapHint = document.getElementById('tapHint');
    const warningText = document.getElementById('warningText');
    const rankContainer = document.getElementById('rank-list');
    const onlineStatus = document.getElementById('onlineStatus');
    
    function calcLevel(score) { return Math.floor(score / 50) + 1; }
    
    function updateUI() {
        scoreEl.innerText = currentScore.toLocaleString();
        lvEl.innerText = currentLevel;
        if (playerName) {
            currentUserDisplay.innerHTML = `<i class="fas fa-user-check"></i> กำลังเล่น: ${playerName}`;
        }
    }
    
    function setGameEnabled(enabled) {
        isGameReady = enabled;
        if (enabled) {
            popImg.classList.remove('disabled');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กดที่รูปเพื่อเพิ่มคะแนน! <i class="fas fa-fire"></i>';
            warningText.innerHTML = '<i class="fas fa-check-circle"></i> กำลังเล่นด้วยชื่อ: ' + playerName;
            warningText.className = "warning-text success";
        } else {
            popImg.classList.add('disabled');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กรอกชื่อที่สุภาพเพื่อเริ่มเล่น!';
        }
    }
    
    function syncScoreToFirebase() {
        if (!playerName) return;
        db.ref('players/' + encodeURIComponent(playerName)).set({
            name: playerName,
            score: currentScore,
            level: currentLevel,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
    }
    
    function loadPlayerScoreFromFirebase() {
        if (!playerName) return;
        db.ref('players/' + encodeURIComponent(playerName)).once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data && typeof data.score === 'number') {
                currentScore = data.score;
                currentLevel = calcLevel(currentScore);
            } else {
                currentScore = 0;
                currentLevel = 1;
                syncScoreToFirebase();
            }
            updateUI();
            setGameEnabled(true);
            showToast(`สวัสดี ${playerName}!`, 1500);
        });
    }
    
    function listenLeaderboard() {
        db.ref('players').on('value', (snapshot) => {
            const players = [];
            snapshot.forEach(child => {
                const p = child.val();
                if (p && p.name) players.push(p);
            });
            players.sort((a,b) => b.score - a.score);
            allPlayers = players;
            renderLeaderboard();
        });
    }
    
    function renderLeaderboard() {
        if (allPlayers.length === 0) {
            rankContainer.innerHTML = '<div style="padding:16px; font-size:12px;">รอผู้เล่นคนแรก...</div>';
            return;
        }
        let html = '';
        const limit = showFullRank ? allPlayers.length : 5;
        for (let i = 0; i < Math.min(limit, allPlayers.length); i++) {
            const p = allPlayers[i];
            const isMe = (p.name === playerName);
            html += `
                <div class="rank-item" style="${isMe ? 'background:#e8f5e9;' : ''}">
                    <span class="name"><b>${i+1}.</b> ${p.name} <small>Lv.${p.level}</small></span>
                    <span class="pts">${p.score.toLocaleString()} <i class="fas fa-bolt"></i></span>
                </div>
            `;
        }
        if (allPlayers.length > 5) {
            html += `<button class="show-more-btn" onclick="toggleRank()">${showFullRank ? 'ย่อหน้าต่าง' : 'ดูทั้งหมด'}</button>`;
        }
        rankContainer.innerHTML = html;
    }

    function toggleRank() { showFullRank = !showFullRank; renderLeaderboard(); }
    
    function addScore() {
        if (!isGameReady) return showToast("กรอกชื่อก่อนนะ!", 1000, true);
        currentScore++;
        currentLevel = calcLevel(currentScore);
        updateUI();
        syncScoreToFirebase();
        popImg.classList.add('pop-active');
        setTimeout(() => popImg.classList.remove('pop-active'), 80);
        if (navigator.vibrate) navigator.vibrate(10);
    }
    
    function savePlayerName() {
        let name = playerNameInput.value.trim();
        if (isInappropriateName(name)) return showToast("ชื่อไม่สุภาพ!", 2000, true);
        playerName = sanitizeName(name);
        loadPlayerScoreFromFirebase();
        saveNameBtn.innerHTML = '✏️ เปลี่ยนชื่อ';
    }
    
    function showToast(msg, dur=2000, err=false) {
        let t = document.createElement('div');
        t.className = 'toast-msg' + (err ? ' error' : '');
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), dur);
    }
    
    window.onload = () => {
        popImg.addEventListener('click', (e) => { e.preventDefault(); addScore(); });
        popImg.addEventListener('touchstart', (e) => { e.preventDefault(); addScore(); }, {passive: false});
        saveNameBtn.onclick = savePlayerName;
        listenLeaderboard();
        db.ref(".info/connected").on("value", (snap) => {
            onlineStatus.style.color = snap.val() ? "#16a34a" : "#dc2626";
        });
    };
</script>
</body>
</html>
