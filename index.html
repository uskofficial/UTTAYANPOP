<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>อุทยานป็อบ · UTTAYAN POP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e8 100%);
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.97);
            max-width: 460px;
            width: 100%;
            border-radius: 48px;
            padding: 24px 20px 28px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
        }
        .logo {
            width: 60px;
            margin-bottom: 6px;
        }
        h1 {
            background: linear-gradient(135deg, #1a5d1a, #3b8b3b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 28px;
        }
        .badge {
            background: #f0fdf4;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            margin-top: 6px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 20px 0 16px;
        }
        .stat-card {
            background: #f0fdf4;
            padding: 12px 8px;
            border-radius: 28px;
        }
        .stat-card small {
            color: #475569;
            font-size: 12px;
        }
        .stat-card div {
            font-size: 28px;
            font-weight: 800;
            color: #1a5d1a;
        }
        #pop-img {
            width: 180px;
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
            transition: transform 0.06s cubic-bezier(0.2, 1.6, 0.5, 1);
        }
        #pop-img.disabled {
            cursor: not-allowed;
            opacity: 0.6;
            filter: grayscale(0.2);
        }
        .pop-active {
            transform: scale(0.85) rotate(3deg) !important;
        }
        .tap-hint {
            background: #f9f3e0;
            display: inline-block;
            margin-top: 12px;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 11px;
            color: #b45309;
        }
        .name-input-section {
            margin: 16px 0 8px;
            text-align: left;
        }
        .name-input-section label {
            font-size: 12px;
            font-weight: 600;
            color: #1a5d1a;
            display: block;
            margin-bottom: 5px;
        }
        .name-input-section input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #cbe5cb;
            border-radius: 40px;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            background: white;
            outline: none;
            transition: 0.2s;
        }
        .name-input-section input:focus {
            border-color: #1a5d1a;
            box-shadow: 0 0 0 3px rgba(26, 93, 26, 0.1);
        }
        .name-input-section input.error {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .save-name-btn {
            background: #1a5d1a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: 'Kanit', sans-serif;
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: 0.1s;
        }
        .save-name-btn:active {
            transform: scale(0.97);
            background: #0f3f0f;
        }
        .current-user {
            background: #e6f7e6;
            padding: 6px 10px;
            border-radius: 40px;
            font-size: 11px;
            margin-top: 8px;
            color: #1a5d1a;
            display: inline-block;
        }
        .warning-text {
            color: #f59e0b;
            font-size: 10px;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .warning-text.success {
            color: #16a34a;
        }
        
        .leaderboard-section {
            margin-top: 16px;
            text-align: left;
        }
        .leaderboard-section h3 {
            border-left: 4px solid #1a5d1a;
            padding-left: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }
        .rank-list {
            background: #ffffffdd;
            border-radius: 24px;
            overflow: hidden;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #e9f0e9;
            font-size: 13px;
        }
        .rank-item:last-child {
            border-bottom: none;
        }
        .rank-item .name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .rank-item .pts {
            background: #eaf5ea;
            padding: 3px 10px;
            border-radius: 40px;
            font-weight: 700;
            color: #1a5d1a;
            font-size: 12px;
        }
        
        /* ปุ่มดูเพิ่มเติม */
        .show-more-btn {
            background: none;
            border: none;
            color: #1a5d1a;
            font-size: 12px;
            font-family: 'Kanit', sans-serif;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-top: 1px dashed #cbe5cb;
            margin-top: 4px;
            transition: 0.1s;
        }
        .show-more-btn:active {
            background: #e8f5e9;
            border-radius: 0 0 24px 24px;
        }
        .hide-more-btn {
            background: none;
            border: none;
            color: #1a5d1a;
            font-size: 12px;
            font-family: 'Kanit', sans-serif;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-top: 1px dashed #cbe5cb;
            margin-top: 4px;
            transition: 0.1s;
        }
        .hide-more-btn:active {
            background: #e8f5e9;
        }
        
        /* ข้อความด้านล่าง */
        .fair-play-footer {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px dashed #cbe5cb;
            font-size: 10px;
            color: #b45309;
            text-align: center;
            background: #fef9e3;
            border-radius: 20px;
            padding: 10px 12px;
        }
        
        .footer-note {
            font-size: 9px;
            text-align: center;
            margin-top: 12px;
            color: #688f68;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a5d1a;
            color: #fef9c3;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1000;
            white-space: nowrap;
            font-weight: 500;
        }
        .toast-msg.error {
            background: #dc2626;
        }
        @media (max-width: 460px) {
            #pop-img { width: 150px; }
            .main-card { padding: 20px 16px 24px; }
            .fair-play-footer { font-size: 9px; padding: 8px 10px; }
            .rank-item { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <header>
        <img src="https://uskofficial.github.io/UTTAYANHeartNewSeedCamp/assets/img/logo.png" class="logo" alt="logo" onerror="this.src='https://i.postimg.cc/WztgWSpc/IMG-7790.png'">
        <h1>อุทยานป็อบ</h1>
        <div class="badge">
            <i class="fas fa-tree"></i> UTTAYAN POP <i class="fas fa-star"></i>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><small>ระดับเลเวล</small><div id="lv">0</div></div>
        <div class="stat-card"><small>คะแนนรวม</small><div id="score">0</div></div>
    </div>

    <div class="game-box">
        <img src="https://i.postimg.cc/WztgWSpc/IMG-7790.png" id="pop-img" draggable="false" alt="ป๊อป" class="disabled">
    </div>
    <div class="tap-hint" id="tapHint">
        <i class="fas fa-hand-peace"></i> กรอกชื่อที่สุภาพเพื่อเริ่มเล่น! 
        <i class="fas fa-fire"></i>
    </div>

    <!-- ช่องกรอกชื่อผู้เล่น -->
    <div class="name-input-section">
        <label><i class="fas fa-user"></i> ชื่อผู้เล่น</label>
        <input type="text" id="playerNameInput" placeholder="กรุณากรอกชื่อที่สุภาพ" maxlength="24" autocomplete="off">
        <button class="save-name-btn" id="saveNameBtn">▶ บันทึกชื่อและเริ่มเล่น</button>
        <div class="warning-text" id="warningText">
            <i class="fas fa-info-circle"></i> กรอกชื่อเพื่อสะสมคะแนนและแสดงในอันดับ
        </div>
        <div id="currentUserDisplay" class="current-user" style="display: none;"></div>
    </div>

    <div class="leaderboard-section">
        <h3><i class="fas fa-trophy" style="color:#fbbf24;"></i> อันดับนักกดสูงสุด</h3>
        <div id="rank-list" class="rank-list">
            <div style="padding:16px; text-align:center; color:#688f68; font-size:12px;">กำลังโหลดอันดับ...</div>
        </div>
    </div>
    
    <!-- ข้อความด้านล่าง -->
    <div class="fair-play-footer">
        <i class="fas fa-heart"></i>
        ฟิวแบบไม่ทำเพื่อผลประโยชน์ใดอื่น และไม่โจมตีฝ่ายใด — เล่นเพื่อความสนุกเท่านั้น
        <i class="fas fa-smile-wink"></i>
    </div>
    
    <div class="footer-note">
        <i class="fas fa-database"></i> บันทึกคะแนนในเบราว์เซอร์ • กดเยอะ เลเวลพุ่ง!
    </div>
</div>

<script>
    // ==================== รายชื่อคำต้องห้าม ====================
    const inappropriateWords = [
        "เหี้ย", "สัส", "สัด", "ควย", "จู๋", "หี", "แตด", "ตูด", "ชาติชั่ว", "อีดอก", "อีเหี้ย", "ไอ้เหี้ย",
        "มึง", "กู", "แม่ง", "เอ็ง", "โคตร", "ส้นตีน", "กระจอก", "บักหำ", "ไอ้สาด", "อีสาด", "เข้", "กระเทย",
        "กะเทย", "ลำไย", "บักค่อม", "อีตัว", "ร่าน", "โสเภณี",
        "fuck", "shit", "bitch", "asshole", "damn", "cunt", "dick", "pussy", "bastard", "whore",
        "slut", "cock", "motherfucker", "faggot", "retard",
        "ยาเสพติด", "บุหรี่", "สุรา", "เหล้า", "เบียร์", "ไอซ์", "ยาบ้า", "กระท่อม", "กัญชา", "weed",
        "ตาย", "ฆ่า", "มรณะ", "เลือด", "ประหาร", "เผา", "ระเบิด"
    ];
    
    function isInappropriateName(name) {
        if (!name || name.trim() === "") return true;
        let checkName = name.trim().toLowerCase();
        for (let badWord of inappropriateWords) {
            if (checkName.includes(badWord.toLowerCase())) {
                return true;
            }
        }
        if (checkName.length >= 3) {
            let sameCharCount = 1;
            let maxSame = 1;
            for (let i = 1; i < checkName.length; i++) {
                if (checkName[i] === checkName[i-1]) {
                    sameCharCount++;
                    maxSame = Math.max(maxSame, sameCharCount);
                } else {
                    sameCharCount = 1;
                }
            }
            if (maxSame >= 4) return true;
        }
        const hasThai = /[\u0E00-\u0E7F]/.test(checkName);
        const hasEng = /[a-zA-Z]/.test(checkName);
        const hasNumber = /[0-9]/.test(checkName);
        if (!hasThai && !hasEng && !hasNumber) return true;
        if (checkName.length < 1) return true;
        const firstChar = checkName[0];
        if (/[0-9!@#$%^&*()_+=\-[\]{};:'"\\|,.<>/?~`]/.test(firstChar)) return true;
        return false;
    }
    
    function sanitizeName(name) {
        let clean = name.trim();
        clean = clean.replace(/[^\u0E00-\u0E7Fa-zA-Z0-9\s]/g, '');
        clean = clean.trim();
        if (clean === "") return "นักท่องอุทยาน";
        return clean.substring(0, 24);
    }
    
    // ==================== ระบบเกมหลัก ====================
    let currentScore = 0;
    let currentLevel = 1;
    let playerName = "";
    let isGameReady = false;
    let showFullRank = false;  // สถานะแสดงอันดับทั้งหมด
    
    const popImg = document.getElementById('pop-img');
    const scoreEl = document.getElementById('score');
    const lvEl = document.getElementById('lv');
    const playerNameInput = document.getElementById('playerNameInput');
    const saveNameBtn = document.getElementById('saveNameBtn');
    const currentUserDisplay = document.getElementById('currentUserDisplay');
    const tapHint = document.getElementById('tapHint');
    const warningText = document.getElementById('warningText');
    const rankContainer = document.getElementById('rank-list');
    
    function calcLevel(score) {
        return Math.floor(score / 50) + 1;
    }
    
    function updateUI() {
        scoreEl.innerText = currentScore.toLocaleString();
        lvEl.innerText = currentLevel;
    }
    
    function setGameEnabled(enabled) {
        isGameReady = enabled;
        if (enabled) {
            popImg.classList.remove('disabled');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กดที่รูปเพื่อเพิ่มคะแนน! <i class="fas fa-fire"></i>';
            warningText.innerHTML = '<i class="fas fa-check-circle"></i> กำลังเล่นด้วยชื่อ: ' + playerName;
            warningText.className = "warning-text success";
        } else {
            popImg.classList.add('disabled');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กรอกชื่อที่สุภาพเพื่อเริ่มเล่น!';
            warningText.innerHTML = '<i class="fas fa-info-circle"></i> กรอกชื่อเพื่อสะสมคะแนนและแสดงในอันดับ';
            warningText.className = "warning-text";
        }
    }
    
    function saveScoreToLocal() {
        if (!playerName) return;
        
        let allPlayers = [];
        const stored = localStorage.getItem('uttayanPopRanking');
        if (stored) {
            try {
                allPlayers = JSON.parse(stored);
            } catch(e) {}
        }
        
        const existingIndex = allPlayers.findIndex(p => p.name === playerName);
        if (existingIndex !== -1) {
            allPlayers[existingIndex].score = currentScore;
            allPlayers[existingIndex].level = currentLevel;
            allPlayers[existingIndex].timestamp = Date.now();
        } else {
            allPlayers.push({
                name: playerName,
                score: currentScore,
                level: currentLevel,
                timestamp: Date.now()
            });
        }
        
        allPlayers.sort((a,b) => b.score - a.score);
        if (allPlayers.length > 30) allPlayers = allPlayers.slice(0,30);
        localStorage.setItem('uttayanPopRanking', JSON.stringify(allPlayers));
        
        updateLeaderboard();
    }
    
    function loadPlayerScore() {
        if (!playerName) return;
        
        const stored = localStorage.getItem('uttayanPopRanking');
        if (stored) {
            try {
                const allPlayers = JSON.parse(stored);
                const me = allPlayers.find(p => p.name === playerName);
                if (me && typeof me.score === 'number') {
                    currentScore = me.score;
                    currentLevel = calcLevel(currentScore);
                    updateUI();
                    showToast(`👋 ยินดีกลับมา ${playerName} (${currentScore.toLocaleString()} คะแนน)`, 1500);
                    return;
                }
            } catch(e) {}
        }
        
        currentScore = 0;
        currentLevel = 1;
        updateUI();
        saveScoreToLocal();
        showToast(`✨ ยินดีต้อนรับ ${playerName} ✨ กดรูปได้เลย!`, 1500);
    }
    
    function updateLeaderboard() {
        const stored = localStorage.getItem('uttayanPopRanking');
        if (!rankContainer) return;
        
        if (!stored) {
            rankContainer.innerHTML = '<div style="padding:16px; text-align:center; color:#688f68; font-size:12px;"><i class="fas fa-users"></i> ยังไม่มีผู้เล่น</div>';
            return;
        }
        
        let players = [];
        try {
            players = JSON.parse(stored);
        } catch(e) {
            rankContainer.innerHTML = '<div style="padding:16px; text-align:center; color:#dc2626; font-size:12px;">โหลดอันดับผิดพลาด</div>';
            return;
        }
        
        if (players.length === 0) {
            rankContainer.innerHTML = '<div style="padding:16px; text-align:center; color:#688f68; font-size:12px;">ยังไม่มีผู้เล่น</div>';
            return;
        }
        
        players.sort((a,b) => b.score - a.score);
        
        // แสดงเฉพาะ 5 อันดับแรก หรือทั้งหมด ขึ้นอยู่กับสถานะ
        const displayLimit = showFullRank ? players.length : Math.min(5, players.length);
        const hasMore = players.length > 5;
        
        let html = '';
        for (let i = 0; i < displayLimit; i++) {
            const p = players[i];
            const idx = i;
            let medal = '';
            if (idx === 0) medal = '<i class="fas fa-crown" style="color:#f59e0b;"></i> ';
            else if (idx === 1) medal = '<i class="fas fa-medal" style="color:#a0a0a0;"></i> ';
            else if (idx === 2) medal = '<i class="fas fa-medal" style="color:#cd7f32;"></i> ';
            else medal = `<span style="width:24px; display:inline-block; text-align:center;">${idx+1}</span> `;
            
            let displayName = p.name.length > 16 ? p.name.slice(0,14)+".." : p.name;
            let isCurrentUser = (p.name === playerName);
            
            html += `
                <div class="rank-item" style="${isCurrentUser ? 'background:#e8f5e9; border-left: 3px solid #1a5d1a;' : ''}">
                    <span class="name">
                        ${medal} 
                        <span>${displayName}${isCurrentUser ? ' <span style="color:#1a5d1a; font-size:9px;">(คุณ)</span>' : ''}</span>
                        <span style="font-size:9px; background:#e4f0e4; padding:2px 6px; border-radius:30px;">Lv.${p.level || Math.floor(p.score/50)+1}</span>
                    </span>
                    <span class="pts">${p.score.toLocaleString()} <i class="fas fa-bolt" style="font-size:9px;"></i></span>
                </div>
            `;
        }
        
        // เพิ่มปุ่มดูเพิ่มเติม/แสดงน้อยลง
        if (hasMore) {
            if (!showFullRank) {
                html += `
                    <button class="show-more-btn" id="showMoreBtn">
                        <i class="fas fa-chevron-down"></i> ดูเพิ่มเติม (${players.length - 5} อันดับ) <i class="fas fa-chevron-down"></i>
                    </button>
                `;
            } else {
                html += `
                    <button class="hide-more-btn" id="hideMoreBtn">
                        <i class="fas fa-chevron-up"></i> แสดงเฉพาะ 5 อันดับแรก <i class="fas fa-chevron-up"></i>
                    </button>
                `;
            }
        }
        
        rankContainer.innerHTML = html;
        
        // ผูก event ให้ปุ่มใหม่
        const showMoreBtn = document.getElementById('showMoreBtn');
        const hideMoreBtn = document.getElementById('hideMoreBtn');
        
        if (showMoreBtn) {
            showMoreBtn.addEventListener('click', () => {
                showFullRank = true;
                updateLeaderboard();
            });
        }
        
        if (hideMoreBtn) {
            hideMoreBtn.addEventListener('click', () => {
                showFullRank = false;
                updateLeaderboard();
            });
        }
    }
    
    function addScore() {
        if (!isGameReady || !playerName) {
            showToast("⚠️ กรุณากรอกชื่อที่สุภาพก่อนเล่น!", 1500, true);
            return false;
        }
        
        currentScore += 1;
        currentLevel = calcLevel(currentScore);
        updateUI();
        saveScoreToLocal();
        
        popImg.classList.add('pop-active');
        setTimeout(() => popImg.classList.remove('pop-active'), 100);
        popImg.style.transform = "scale(0.92)";
        setTimeout(() => {
            if (!popImg.classList.contains('pop-active')) popImg.style.transform = "";
        }, 80);
        
        if (navigator.vibrate) navigator.vibrate(10);
        return true;
    }
    
    function onPopClick(e) {
        if (e) {
            e.preventDefault();
            if (e.cancelable) e.preventDefault();
        }
        addScore();
    }
    
    function savePlayerName() {
        let rawName = playerNameInput.value.trim();
        
        if (isInappropriateName(rawName)) {
            showToast("⚠️ ไม่สามารถใช้ชื่อนี้ได้ กรุณากรอกชื่อที่สุภาพ", 2500, true);
            playerNameInput.classList.add('error');
            playerNameInput.value = "";
            playerNameInput.focus();
            return;
        }
        
        let cleanName = sanitizeName(rawName);
        if (cleanName === "" || cleanName.length < 1) {
            showToast("⚠️ กรุณากรอกชื่อที่สุภาพ", 2000, true);
            playerNameInput.classList.add('error');
            playerNameInput.focus();
            return;
        }
        
        if (isInappropriateName(cleanName)) {
            showToast("⚠️ ชื่อนี้ไม่เหมาะสม กรุณากรอกชื่ออื่น", 2000, true);
            playerNameInput.classList.add('error');
            playerNameInput.value = "";
            playerNameInput.focus();
            return;
        }
        
        playerNameInput.classList.remove('error');
        
        if (playerName !== "" && playerName !== cleanName) {
            playerName = cleanName;
            playerNameInput.value = playerName;
            loadPlayerScore();
            updateCurrentUserDisplay();
            setGameEnabled(true);
            showToast(`✅ เปลี่ยนชื่อเป็น ${playerName}`, 1500);
            updateLeaderboard();
            saveNameBtn.innerHTML = '✏️ เปลี่ยนชื่อ';
        } 
        else if (playerName === "") {
            playerName = cleanName;
            playerNameInput.value = playerName;
            loadPlayerScore();
            updateCurrentUserDisplay();
            setGameEnabled(true);
            showToast(`✅ เริ่มเล่น! สวัสดี ${playerName}`, 1500);
            updateLeaderboard();
            saveNameBtn.innerHTML = '✏️ เปลี่ยนชื่อ';
        }
        else if (playerName === cleanName) {
            showToast(`👋 สวัสดี ${playerName}`, 1000);
        }
    }
    
    function updateCurrentUserDisplay() {
        if (playerName) {
            currentUserDisplay.innerHTML = `<i class="fas fa-user-check"></i> กำลังเล่น: ${playerName} (${currentScore.toLocaleString()} คะแนน)`;
            currentUserDisplay.style.display = "inline-block";
        } else {
            currentUserDisplay.style.display = "none";
        }
    }
    
    function showToast(msg, duration = 2000, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg' + (isError ? ' error' : '');
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    
    function bindEvents() {
        popImg.addEventListener('click', onPopClick);
        popImg.addEventListener('touchstart', onPopClick, { passive: false });
        popImg.addEventListener('dragstart', (e) => e.preventDefault());
        popImg.addEventListener('contextmenu', (e) => e.preventDefault());
        
        saveNameBtn.addEventListener('click', savePlayerName);
        
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                savePlayerName();
            }
        });
        
        playerNameInput.addEventListener('input', () => {
            playerNameInput.classList.remove('error');
        });
    }
    
    function loadInitialLeaderboard() {
        updateLeaderboard();
    }
    
    window.onload = () => {
        bindEvents();
        loadInitialLeaderboard();
        setGameEnabled(false);
        playerNameInput.focus();
    };
</script>
</body>
</html>
