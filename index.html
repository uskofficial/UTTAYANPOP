<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>อุทยานป็อบ · UTTAYAN POP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e8 100%);
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.97);
            max-width: 460px;
            width: 100%;
            border-radius: 48px;
            padding: 28px 24px 36px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
        }
        .logo {
            width: 72px;
            margin-bottom: 8px;
        }
        h1 {
            background: linear-gradient(135deg, #1a5d1a, #3b8b3b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 32px;
        }
        .badge {
            background: #f0fdf4;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            margin-top: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin: 28px 0 20px;
        }
        .stat-card {
            background: #f0fdf4;
            padding: 16px;
            border-radius: 32px;
        }
        .stat-card small {
            color: #475569;
            font-size: 13px;
        }
        .stat-card div {
            font-size: 32px;
            font-weight: 800;
            color: #1a5d1a;
        }
        #pop-img {
            width: 220px;
            cursor: pointer;
            filter: drop-shadow(0 14px 18px rgba(0, 0, 0, 0.2));
            transition: transform 0.06s cubic-bezier(0.2, 1.6, 0.5, 1);
        }
        #pop-img.disabled {
            cursor: not-allowed;
            opacity: 0.7;
            filter: grayscale(0.2);
        }
        .pop-active {
            transform: scale(0.85) rotate(3deg) !important;
        }
        .tap-hint {
            background: #f9f3e0;
            display: inline-block;
            margin-top: 16px;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            color: #b45309;
        }
        .name-input-section {
            margin: 20px 0 10px;
            text-align: left;
        }
        .name-input-section label {
            font-size: 13px;
            font-weight: 600;
            color: #1a5d1a;
            display: block;
            margin-bottom: 6px;
        }
        .name-input-section input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cbe5cb;
            border-radius: 40px;
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
            background: white;
            outline: none;
            transition: 0.2s;
        }
        .name-input-section input:focus {
            border-color: #1a5d1a;
            box-shadow: 0 0 0 3px rgba(26, 93, 26, 0.1);
        }
        .name-input-section input.error {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .save-name-btn {
            background: #1a5d1a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-family: 'Kanit', sans-serif;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.1s;
        }
        .save-name-btn:active {
            transform: scale(0.97);
            background: #0f3f0f;
        }
        .save-name-btn.disabled {
            background: #a0c4a0;
            cursor: not-allowed;
            transform: none;
        }
        .current-user {
            background: #e6f7e6;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 13px;
            margin-top: 10px;
            color: #1a5d1a;
            display: inline-block;
        }
        .warning-text {
            color: #dc2626;
            font-size: 11px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .warning-text.success {
            color: #16a34a;
        }
        .leaderboard-section {
            margin-top: 28px;
            text-align: left;
        }
        .leaderboard-section h3 {
            border-left: 5px solid #1a5d1a;
            padding-left: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
        }
        .rank-list {
            background: #ffffffdd;
            border-radius: 28px;
            overflow: hidden;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid #e9f0e9;
        }
        .rank-item:last-child {
            border-bottom: none;
        }
        .rank-item .name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .rank-item .pts {
            background: #eaf5ea;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 700;
            color: #1a5d1a;
        }
        .footer-note {
            font-size: 10px;
            text-align: center;
            margin-top: 24px;
            color: #688f68;
            border-top: 1px dashed #cbe5cb;
            padding-top: 14px;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a5d1a;
            color: #fef9c3;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            white-space: nowrap;
            font-weight: 500;
        }
        .toast-msg.error {
            background: #dc2626;
        }
        @media (max-width: 460px) {
            #pop-img { width: 180px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <header>
        <img src="https://uskofficial.github.io/UTTAYANHeartNewSeedCamp/assets/img/logo.png" class="logo" alt="logo" onerror="this.src='https://i.postimg.cc/WztgWSpc/IMG-7790.png'">
        <h1>อุทยานป็อบ</h1>
        <div class="badge">
            <i class="fas fa-tree"></i> UTTAYAN POP <i class="fas fa-star"></i>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><small>ระดับเลเวล</small><div id="lv">0</div></div>
        <div class="stat-card"><small>คะแนนรวม</small><div id="score">0</div></div>
    </div>

    <div class="game-box">
        <img src="https://i.postimg.cc/WztgWSpc/IMG-7790.png" id="pop-img" draggable="false" alt="ป๊อป" class="disabled">
    </div>
    <div class="tap-hint" id="tapHint">
        <i class="fas fa-hand-peace"></i> กรอกชื่อที่สุภาพเพื่อเริ่มเล่น! 
        <i class="fas fa-fire"></i>
    </div>

    <!-- ช่องกรอกชื่อผู้เล่น -->
    <div class="name-input-section">
        <label><i class="fas fa-user"></i> ชื่อผู้เล่น <span style="color:#dc2626;">*</span></label>
        <input type="text" id="playerNameInput" placeholder="กรุณากรอกชื่อที่สุภาพ" maxlength="24" autocomplete="off">
        <button class="save-name-btn" id="saveNameBtn">▶ บันทึกชื่อและเริ่มเล่น</button>
        <div class="warning-text" id="warningText">
            <i class="fas fa-shield-alt"></i> กรุณากรอกชื่อที่สุภาพ (ห้ามใช้คำหยาบคาย)
        </div>
        <div id="currentUserDisplay" class="current-user" style="display: none;"></div>
    </div>

    <div class="leaderboard-section">
        <h3><i class="fas fa-trophy" style="color:#fbbf24;"></i> อันดับนักกดสูงสุด</h3>
        <div id="rank-list" class="rank-list">
            <div style="padding:20px; text-align:center; color:#688f68;">กรอกชื่อที่สุภาพและเริ่มเล่นได้เลย!</div>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-database"></i> บันทึกคะแนนในเบราว์เซอร์ • กดเยอะ เลเวลพุ่ง!
    </div>
</div>

<script>
    // ==================== รายชื่อคำต้องห้าม (ไม่สุภาพ) ====================
    const inappropriateWords = [
        // คำหยาบคายภาษาไทย
        "เหี้ย", "สัส", "สัด", "ควย", "จู๋", "หี", "แตด", "ตูด", "ชาติชั่ว", "อีดอก", "อีเหี้ย", "ไอ้เหี้ย",
        "มึง", "กู", "แม่ง", "เอ็ง", "โคตร", "ส้นตีน", "กระจอก", "บักหำ", "ไอ้สาด", "อีสาด", "เข้", "กระเทย",
        "กะเทย", "สาวประเภทสอง", "ลำไย", "บักค่อม", "อีตัว", "เด็กเลี้ยง", "ร่าน", "หญิงโสเภณี", "โสเภณี",
        // คำหยาบคายภาษาอังกฤษ
        "fuck", "shit", "bitch", "asshole", "damn", "cunt", "dick", "pussy", "bastard", "whore",
        "slut", "cock", "motherfucker", "faggot", "retard", "stupid", "idiot", "moron", "dumbass",
        // คำที่สื่อถึงยาเสพติด
        "ยาเสพติด", "บุหรี่", "สุรา", "เหล้า", "เบียร์", "ไอซ์", "ยาบ้า", "กระท่อม", "กัญชา", "weed",
        // คำที่สื่อถึงความรุนแรง
        "ตาย", "ฆ่า", "มรณะ", "เลือด", "ประหาร", "เผา", "ระเบิด"
    ];
    
    // ฟังก์ชันตรวจสอบชื่อไม่สุภาพ
    function isInappropriateName(name) {
        if (!name || name.trim() === "") return true;
        
        let checkName = name.trim().toLowerCase();
        
        // 1. ตรวจสอบคำต้องห้าม
        for (let badWord of inappropriateWords) {
            if (checkName.includes(badWord.toLowerCase())) {
                return true;
            }
        }
        
        // 2. ตรวจสอบตัวอักษรซ้ำซ้อนเกินไป (เช่น กกกก, 1111, ㅋㅋㅋ)
        if (checkName.length >= 3) {
            let sameCharCount = 1;
            let maxSame = 1;
            for (let i = 1; i < checkName.length; i++) {
                if (checkName[i] === checkName[i-1]) {
                    sameCharCount++;
                    maxSame = Math.max(maxSame, sameCharCount);
                } else {
                    sameCharCount = 1;
                }
            }
            // ถ้าตัวอักษรซ้ำกันเกิน 3 ตัวติดต่อกัน
            if (maxSame >= 4) {
                return true;
            }
        }
        
        // 3. ตรวจสอบว่ามีตัวอักษรภาษาไทยหรือภาษาอังกฤษอย่างน้อย 1 ตัว (ห้ามเว้นว่างหรือมีแต่สัญลักษณ์)
        const hasThai = /[\u0E00-\u0E7F]/.test(checkName);
        const hasEng = /[a-zA-Z]/.test(checkName);
        const hasNumber = /[0-9]/.test(checkName);
        
        // ต้องมีตัวอักษร (ไทยหรืออังกฤษ) อย่างน้อย 1 ตัว
        if (!hasThai && !hasEng && !hasNumber) {
            return true;
        }
        
        // 4. ตรวจสอบความยาว (อย่างน้อย 1 ตัวอักษร)
        if (checkName.length < 1) {
            return true;
        }
        
        // 5. ตรวจสอบชื่อที่ขึ้นต้นด้วยตัวเลขหรือสัญลักษณ์พิเศษ (ไม่ควร)
        const firstChar = checkName[0];
        if (/[0-9!@#$%^&*()_+=\-[\]{};:'"\\|,.<>/?~`]/.test(firstChar)) {
            return true;
        }
        
        return false;
    }
    
    // ฟังก์ชันทำความสะอาดชื่อ (ตัดอักษรไม่เหมาะสม)
    function sanitizeName(name) {
        let clean = name.trim();
        // ตัดอักขระพิเศษที่ไม่เหมาะสมออก (เหลือเฉพาะ ไทย, อังกฤษ, ตัวเลข, เว้นวรรค)
        clean = clean.replace(/[^\u0E00-\u0E7Fa-zA-Z0-9\s]/g, '');
        // ตัดช่องว่างต้น-ท้าย
        clean = clean.trim();
        if (clean === "") return "นักท่องอุทยาน";
        return clean.substring(0, 24);
    }
    
    // ==================== ระบบเกมหลัก ====================
    let currentScore = 0;
    let currentLevel = 1;
    let playerName = "";
    let isGameReady = false;
    
    const popImg = document.getElementById('pop-img');
    const scoreEl = document.getElementById('score');
    const lvEl = document.getElementById('lv');
    const playerNameInput = document.getElementById('playerNameInput');
    const saveNameBtn = document.getElementById('saveNameBtn');
    const currentUserDisplay = document.getElementById('currentUserDisplay');
    const tapHint = document.getElementById('tapHint');
    const warningText = document.getElementById('warningText');
    
    function calcLevel(score) {
        return Math.floor(score / 50) + 1;
    }
    
    function updateUI() {
        scoreEl.innerText = currentScore.toLocaleString();
        lvEl.innerText = currentLevel;
    }
    
    function setGameEnabled(enabled) {
        isGameReady = enabled;
        if (enabled) {
            popImg.classList.remove('disabled');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กดที่รูปเพื่อเพิ่มคะแนน! <i class="fas fa-fire"></i>';
            warningText.innerHTML = '<i class="fas fa-check-circle"></i> กำลังเล่นด้วยชื่อที่สุภาพ  <i class="fas fa-smile"></i>';
            warningText.className = "warning-text success";
        } else {
            popImg.classList.add('disabled');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กรอกชื่อที่สุภาพเพื่อเริ่มเล่น! <i class="fas fa-fire"></i>';
            warningText.innerHTML = '<i class="fas fa-shield-alt"></i> กรุณากรอกชื่อที่สุภาพ (ห้ามใช้คำหยาบคาย)';
            warningText.className = "warning-text";
        }
    }
    
    function saveScoreToLocal() {
        if (!playerName) return;
        
        let allPlayers = [];
        const stored = localStorage.getItem('uttayanPopRanking');
        if (stored) {
            try {
                allPlayers = JSON.parse(stored);
            } catch(e) {}
        }
        
        const existingIndex = allPlayers.findIndex(p => p.name === playerName);
        if (existingIndex !== -1) {
            allPlayers[existingIndex].score = currentScore;
            allPlayers[existingIndex].level = currentLevel;
            allPlayers[existingIndex].timestamp = Date.now();
        } else {
            allPlayers.push({
                name: playerName,
                score: currentScore,
                level: currentLevel,
                timestamp: Date.now()
            });
        }
        
        allPlayers.sort((a,b) => b.score - a.score);
        if (allPlayers.length > 20) allPlayers = allPlayers.slice(0,20);
        localStorage.setItem('uttayanPopRanking', JSON.stringify(allPlayers));
        
        updateLeaderboard();
    }
    
    function loadPlayerScore() {
        if (!playerName) return;
        
        const stored = localStorage.getItem('uttayanPopRanking');
        if (stored) {
            try {
                const allPlayers = JSON.parse(stored);
                const me = allPlayers.find(p => p.name === playerName);
                if (me && typeof me.score === 'number') {
                    currentScore = me.score;
                    currentLevel = calcLevel(currentScore);
                    updateUI();
                    showToast(`👋 ยินดีกลับมา ${playerName} (${currentScore.toLocaleString()} คะแนน)`, 1500);
                    return;
                }
            } catch(e) {}
        }
        
        currentScore = 0;
        currentLevel = 1;
        updateUI();
        saveScoreToLocal();
        showToast(`✨ ยินดีต้อนรับ ${playerName} ✨ กดรูปได้เลย!`, 1500);
    }
    
    function updateLeaderboard() {
        const stored = localStorage.getItem('uttayanPopRanking');
        const rankContainer = document.getElementById('rank-list');
        if (!rankContainer) return;
        
        if (!stored) {
            rankContainer.innerHTML = '<div style="padding:20px; text-align:center;">ยังไม่มีผู้เล่น กรอกชื่อที่สุภาพและกดรูปเป็นคนแรก!</div>';
            return;
        }
        
        let players = [];
        try {
            players = JSON.parse(stored);
        } catch(e) {
            rankContainer.innerHTML = '<div style="padding:20px; text-align:center;">โหลดอันดับผิดพลาด</div>';
            return;
        }
        
        if (players.length === 0) {
            rankContainer.innerHTML = '<div style="padding:20px; text-align:center;">ยังไม่มีผู้เล่น กรอกชื่อที่สุภาพและเริ่มกดรูปเลย!</div>';
            return;
        }
        
        let html = '';
        players.slice(0, 10).forEach((p, idx) => {
            let medal = '';
            if (idx === 0) medal = '<i class="fas fa-crown" style="color:#f59e0b;"></i> ';
            else if (idx === 1) medal = '<i class="fas fa-medal" style="color:#a0a0a0;"></i> ';
            else if (idx === 2) medal = '<i class="fas fa-medal" style="color:#cd7f32;"></i> ';
            else medal = `<span style="width:24px; display:inline-block; text-align:center;">${idx+1}</span> `;
            
            let displayName = p.name.length > 18 ? p.name.slice(0,16)+".." : p.name;
            let isCurrentUser = (p.name === playerName);
            
            html += `
                <div class="rank-item" style="${isCurrentUser ? 'background:#e8f5e9;' : ''}">
                    <span class="name">
                        ${medal} 
                        <span>${displayName}${isCurrentUser ? ' (คุณ)' : ''}</span>
                        <span style="font-size:10px; background:#e4f0e4; padding:2px 6px; border-radius:30px;">Lv.${p.level || Math.floor(p.score/50)+1}</span>
                    </span>
                    <span class="pts">${p.score.toLocaleString()} <i class="fas fa-bolt"></i></span>
                </div>
            `;
        });
        rankContainer.innerHTML = html;
    }
    
    function addScore() {
        if (!isGameReady || !playerName) {
            showToast("⚠️ กรุณากรอกชื่อที่สุภาพก่อนเล่น!", 1500, true);
            return false;
        }
        
        currentScore += 1;
        currentLevel = calcLevel(currentScore);
        updateUI();
        saveScoreToLocal();
        
        popImg.classList.add('pop-active');
        setTimeout(() => popImg.classList.remove('pop-active'), 100);
        popImg.style.transform = "scale(0.92)";
        setTimeout(() => {
            if (!popImg.classList.contains('pop-active')) popImg.style.transform = "";
        }, 80);
        
        if (navigator.vibrate) navigator.vibrate(10);
        return true;
    }
    
    function onPopClick(e) {
        if (e) {
            e.preventDefault();
            if (e.cancelable) e.preventDefault();
        }
        addScore();
    }
    
    // บันทึกชื่อผู้เล่น (พร้อมตรวจสอบความสุภาพ)
    function savePlayerName() {
        let rawName = playerNameInput.value.trim();
        
        // ตรวจสอบชื่อไม่สุภาพ
        if (isInappropriateName(rawName)) {
            showToast("⚠️ ไม่สามารถใช้ชื่อนี้ได้ กรุณากรอกชื่อที่สุภาพ", 2500, true);
            playerNameInput.classList.add('error');
            playerNameInput.value = "";
            playerNameInput.focus();
            return;
        }
        
        // ทำความสะอาดชื่อ
        let cleanName = sanitizeName(rawName);
        if (cleanName === "" || cleanName.length < 1) {
            showToast("⚠️ กรุณากรอกชื่อที่สุภาพ (ตัวอักษรภาษาไทยหรืออังกฤษ)", 2000, true);
            playerNameInput.classList.add('error');
            playerNameInput.focus();
            return;
        }
        
        // ตรวจสอบอีกครั้งหลังจากทำความสะอาด
        if (isInappropriateName(cleanName)) {
            showToast("⚠️ ชื่อนี้ไม่เหมาะสม กรุณากรอกชื่ออื่น", 2000, true);
            playerNameInput.classList.add('error');
            playerNameInput.value = "";
            playerNameInput.focus();
            return;
        }
        
        playerNameInput.classList.remove('error');
        
        // ถ้ามีชื่อเดิมและเปลี่ยนชื่อ
        if (playerName !== "" && playerName !== cleanName) {
            playerName = cleanName;
            playerNameInput.value = playerName;
            loadPlayerScore();
            updateCurrentUserDisplay();
            setGameEnabled(true);
            showToast(`✅ เปลี่ยนชื่อเป็น ${playerName} เรียบร้อย`, 1500);
            updateLeaderboard();
            saveNameBtn.innerHTML = '✏️ เปลี่ยนชื่อ';
        } 
        else if (playerName === "") {
            // ครั้งแรก
            playerName = cleanName;
            playerNameInput.value = playerName;
            loadPlayerScore();
            updateCurrentUserDisplay();
            setGameEnabled(true);
            showToast(`✅ เริ่มเล่น! สวัสดี ${playerName}`, 1500);
            updateLeaderboard();
            saveNameBtn.innerHTML = '✏️ เปลี่ยนชื่อ';
        }
        else if (playerName === cleanName) {
            showToast(`👋 สวัสดี ${playerName}`, 1000);
        }
    }
    
    function updateCurrentUserDisplay() {
        if (playerName) {
            currentUserDisplay.innerHTML = `<i class="fas fa-user-check"></i> กำลังเล่น: ${playerName} (${currentScore.toLocaleString()} คะแนน)`;
            currentUserDisplay.style.display = "inline-block";
        } else {
            currentUserDisplay.style.display = "none";
        }
    }
    
    function showToast(msg, duration = 2000, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg' + (isError ? ' error' : '');
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    
    function bindEvents() {
        popImg.addEventListener('click', onPopClick);
        popImg.addEventListener('touchstart', onPopClick, { passive: false });
        popImg.addEventListener('dragstart', (e) => e.preventDefault());
        popImg.addEventListener('contextmenu', (e) => e.preventDefault());
        
        saveNameBtn.addEventListener('click', savePlayerName);
        
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                savePlayerName();
            }
        });
        
        // ลบ error class เมื่อเริ่มพิมพ์
        playerNameInput.addEventListener('input', () => {
            playerNameInput.classList.remove('error');
        });
    }
    
    window.onload = () => {
        bindEvents();
        updateLeaderboard();
        setGameEnabled(false);
        playerNameInput.focus();
    };
</script>
</body>
</html>
