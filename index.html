<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>อุทยานป็อบ · UTTAYAN POP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e8 100%);
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.97);
            max-width: 460px;
            width: 100%;
            border-radius: 48px;
            padding: 24px 20px 28px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            position: relative;
        }
        .logo {
            width: 60px;
            margin-bottom: 6px;
        }
        .title-container {
            margin: 5px 0 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .title-image {
            width: 100%;
            max-width: 380px;
            height: auto;
            filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.12));
        }
        .badge {
            background: #f0fdf4;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            margin-top: 5px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 20px 0 16px;
        }
        .stat-card {
            background: #f0fdf4;
            padding: 12px 8px;
            border-radius: 28px;
        }
        .stat-card small {
            color: #475569;
            font-size: 12px;
        }
        .stat-card div {
            font-size: 28px;
            font-weight: 800;
            color: #1a5d1a;
            word-break: break-word;
        }
        #pop-img {
            width: 180px;
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
            transition: transform 0.06s cubic-bezier(0.2, 1.6, 0.5, 1);
        }
        #pop-img.disabled {
            cursor: not-allowed;
            opacity: 0.6;
            filter: grayscale(0.2);
        }
        .pop-active {
            transform: scale(0.85) rotate(3deg) !important;
        }
        .tap-hint {
            background: #f9f3e0;
            display: inline-block;
            margin-top: 12px;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 11px;
            color: #b45309;
        }
        .name-input-section {
            margin: 16px 0 8px;
            text-align: left;
        }
        .name-input-section label {
            font-size: 12px;
            font-weight: 600;
            color: #1a5d1a;
            display: block;
            margin-bottom: 5px;
        }
        .name-input-section input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #cbe5cb;
            border-radius: 40px;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            background: white;
            outline: none;
            transition: 0.2s;
        }
        .name-input-section input:focus {
            border-color: #1a5d1a;
            box-shadow: 0 0 0 3px rgba(26, 93, 26, 0.1);
        }
        .save-name-btn {
            background: #1a5d1a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: 'Kanit', sans-serif;
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: 0.1s;
        }
        .save-name-btn:active {
            transform: scale(0.97);
            background: #0f3f0f;
        }
        .current-user {
            background: #e6f7e6;
            padding: 6px 10px;
            border-radius: 40px;
            font-size: 11px;
            margin-top: 8px;
            color: #1a5d1a;
            display: inline-block;
        }
        .warning-text {
            color: #f59e0b;
            font-size: 10px;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .warning-text.success {
            color: #16a34a;
        }
        
        .leaderboard-section {
            margin-top: 16px;
            text-align: left;
        }
        .leaderboard-section h3 {
            border-left: 4px solid #1a5d1a;
            padding-left: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }
        .rank-list {
            background: #ffffffdd;
            border-radius: 24px;
            overflow: hidden;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #e9f0e9;
            font-size: 13px;
        }
        .rank-item:last-child {
            border-bottom: none;
        }
        .rank-item .name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            flex-wrap: wrap;
        }
        .rank-item .pts {
            background: #eaf5ea;
            padding: 3px 10px;
            border-radius: 40px;
            font-weight: 700;
            color: #1a5d1a;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .trophy-gold { color: #fbbf24; font-size: 16px; }
        .trophy-silver { color: #9ca3af; font-size: 16px; }
        .trophy-bronze { color: #cd7f32; font-size: 16px; }
        
        .congrats-pop {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            color: #b45309;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 18px;
            font-family: 'Kanit', sans-serif;
            white-space: nowrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: popFly 0.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes popFly {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5); bottom: 15%; }
            20% { opacity: 1; transform: translateX(-50%) scale(1.1); }
            80% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(0.8); bottom: 30%; display: none; }
        }
        
        .show-more-btn {
            background: none;
            border: none;
            color: #1a5d1a;
            font-size: 12px;
            font-family: 'Kanit', sans-serif;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-top: 1px dashed #cbe5cb;
            margin-top: 4px;
            transition: 0.1s;
        }
        .show-more-btn:active {
            background: #e8f5e9;
            border-radius: 0 0 24px 24px;
        }
        
        .fair-play-footer {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px dashed #cbe5cb;
            font-size: 10px;
            color: #b45309;
            text-align: center;
            background: #fef9e3;
            border-radius: 20px;
            padding: 10px 12px;
        }
        
        .footer-note {
            font-size: 9px;
            text-align: center;
            margin-top: 12px;
            color: #688f68;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a5d1a;
            color: #fef9c3;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1000;
            white-space: nowrap;
            font-weight: 500;
        }
        .toast-msg.error {
            background: #dc2626;
        }
        .online-status {
            font-size: 9px;
            color: #16a34a;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        @media (max-width: 460px) {
            #pop-img { width: 150px; }
            .main-card { padding: 20px 16px 24px; }
            .rank-item .pts { font-size: 10px; white-space: normal; word-break: break-word; }
            .title-image { max-width: 300px; }
            .congrats-pop { font-size: 14px; padding: 6px 16px; white-space: nowrap; }
            .stat-card div { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <header>
        <img src="https://uskofficial.github.io/UTTAYANHeartNewSeedCamp/assets/img/logo.png" class="logo" alt="logo" onerror="this.src='https://i.postimg.cc/WztgWSpc/IMG-7790.png'">
        <div class="title-container">
            <img src="https://i.postimg.cc/FHrQjZMT/IMG-8866.png" class="title-image" alt="UTTAYAN POP USK">
        </div>
        <div class="badge">
            <i class="fas fa-tree"></i> UTTAYAN POP <i class="fas fa-star"></i>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><small>ระดับเลเวล</small><div id="lv">0</div></div>
        <div class="stat-card"><small>คะแนนรวม</small><div id="score">0</div></div>
    </div>

    <div class="game-box">
        <img src="https://i.postimg.cc/WztgWSpc/IMG-7790.png" id="pop-img" draggable="false" alt="ป๊อป" class="disabled">
    </div>
    <div class="tap-hint" id="tapHint">
        <i class="fas fa-hand-peace"></i> กรอกชื่อที่สุภาพเพื่อเริ่มเล่น! 
        <i class="fas fa-fire"></i>
    </div>

    <div class="name-input-section">
        <label><i class="fas fa-user"></i> ชื่อผู้เล่น</label>
        <input type="text" id="playerNameInput" placeholder="กรุณากรอกชื่อที่สุภาพ" maxlength="24" autocomplete="off">
        <button class="save-name-btn" id="saveNameBtn">▶ บันทึกชื่อและเริ่มเล่น</button>
        <div class="warning-text" id="warningText">
            <i class="fas fa-info-circle"></i> กรอกชื่อเพื่อสะสมคะแนนและแสดงในอันดับ
        </div>
        <div id="currentUserDisplay" class="current-user" style="display: none;"></div>
    </div>

    <div class="leaderboard-section">
        <h3><i class="fas fa-trophy" style="color:#fbbf24;"></i> อันดับนักกดสูงสุด <span style="font-size:10px;">(เรียลไทม์)</span></h3>
        <div id="rank-list" class="rank-list">
            <div style="padding:16px; text-align:center; color:#688f68; font-size:12px;">กำลังโหลดอันดับ...</div>
        </div>
    </div>
    
    <div class="fair-play-footer">
        <i class="fas fa-heart"></i>
        ฟิวแบบไม่ทำเพื่อผลประโยชน์ใดอื่น และไม่โจมตีฝ่ายใด — เล่นเพื่อความสนุกเท่านั้น
        <i class="fas fa-smile-wink"></i>
    </div>
    
    <div class="footer-note">
        <i class="fas fa-globe"></i> อัปเดตเรียลไทม์ทุกคน • กดเยอะ เลเวลพุ่ง!
    </div>
    <div class="online-status" id="onlineStatus">
        <i class="fas fa-circle" style="color:#16a34a; font-size:6px;"></i> เชื่อมต่อออนไลน์
    </div>
</div>

<script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDXVXeobHQE_MrUcfyvK-G16gtGa8bdEHc",
        authDomain: "uttayanpop.firebaseapp.com",
        databaseURL: "https://uttayanpop-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "uttayanpop",
        storageBucket: "uttayanpop.firebasestorage.app",
        messagingSenderId: "740525391264",
        appId: "1:740525391264:web:4ab7ddafb1ad75d4aab8c5"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    
    // ==================== ระบบจัดการคำไม่เหมาะสม ====================
    const inappropriateWords = ["เหี้ย", "สัส", "ควย", "fuck", "shit", "ยาบ้า", "ส้นตีน", "กระจอก", "สัด", "ไอ้", "มึง", "กู", "เหรีย", "สลบ", "ชาติช้าง"];
    
    function isInappropriateName(name) {
        if (!name || name.trim() === "") return true;
        let checkName = name.trim().toLowerCase();
        for (let badWord of inappropriateWords) {
            if (checkName.includes(badWord)) return true;
        }
        return false;
    }
    
    function sanitizeName(name) {
        let clean = name.trim().replace(/[^\u0E00-\u0E7Fa-zA-Z0-9\s]/g, '');
        return clean.substring(0, 24) || "นักท่องอุทยาน";
    }
    
    // ==================== Logic ตัวเกม ====================
    let currentScore = 0;
    let currentLevel = 1;
    let playerName = "";
    let isGameReady = false;
    let showFullRank = false;
    let allPlayers = [];
    let congratsShownTime = {}; 
    let pendingUpdate = false;
    let lastUpdateTime = 0;
    
    const popImg = document.getElementById('pop-img');
    const scoreEl = document.getElementById('score');
    const lvEl = document.getElementById('lv');
    const playerNameInput = document.getElementById('playerNameInput');
    const saveNameBtn = document.getElementById('saveNameBtn');
    const currentUserDisplay = document.getElementById('currentUserDisplay');
    const tapHint = document.getElementById('tapHint');
    const warningText = document.getElementById('warningText');
    const rankContainer = document.getElementById('rank-list');
    const onlineStatus = document.getElementById('onlineStatus');
    
    function calcLevel(score) { return Math.floor(score / 50) + 1; }
    
    function updateUI() {
        scoreEl.innerText = currentScore.toLocaleString('en-US');
        lvEl.innerText = currentLevel;
        if (playerName) {
            currentUserDisplay.innerHTML = `<i class="fas fa-user-check"></i> กำลังเล่น: ${playerName} (${currentScore.toLocaleString()} คะแนน)`;
            currentUserDisplay.style.display = "inline-block";
        }
    }
    
    function setGameEnabled(enabled) {
        isGameReady = enabled;
        if (enabled) {
            popImg.classList.remove('disabled');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กดที่รูปเพื่อเพิ่มคะแนน! <i class="fas fa-fire"></i>';
            warningText.innerHTML = '<i class="fas fa-check-circle"></i> กำลังเล่นด้วยชื่อ: ' + playerName;
            warningText.className = "warning-text success";
        } else {
            popImg.classList.add('disabled');
            tapHint.innerHTML = '<i class="fas fa-hand-peace"></i> กรอกชื่อที่สุภาพเพื่อเริ่มเล่น!';
        }
    }
    
    // อัปเดตคะแนนไป Firebase
    function syncScoreToFirebase() {
        if (!playerName) return;
        
        const playerRef = db.ref('players/' + encodeURIComponent(playerName));
        const newScore = currentScore;
        const newLevel = currentLevel;
        
        playerRef.update({
            name: playerName,
            score: newScore,
            level: newLevel,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).catch(err => {
            console.error("อัปเดต Firebase ล้มเหลว:", err);
        });
    }
    
    function loadPlayerScoreFromFirebase() {
        if (!playerName) return;
        const playerRef = db.ref('players/' + encodeURIComponent(playerName));
        
        playerRef.once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data && typeof data.score === 'number' && data.score !== undefined) {
                currentScore = data.score;
                currentLevel = calcLevel(currentScore);
            } else {
                currentScore = 0;
                currentLevel = 1;
                syncScoreToFirebase();
            }
            updateUI();
            setGameEnabled(true);
            showToast(`สวัสดี ${playerName}! กดได้เลย`, 1500);
        }).catch(err => {
            console.error("โหลดข้อมูลผิดพลาด:", err);
            currentScore = 0;
            currentLevel = 1;
            updateUI();
            setGameEnabled(true);
        });
    }
    
    function showCongratsForRankOne(rankOneName) {
        if (!rankOneName) return;
        const now = Date.now();
        const lastShown = congratsShownTime[rankOneName] || 0;
        if (lastShown && (now - lastShown) < 180000) {
            return;
        }
        congratsShownTime[rankOneName] = now;
        
        const popDiv = document.createElement('div');
        popDiv.className = 'congrats-pop';
        popDiv.innerHTML = `<i class="fas fa-crown" style="color:#f59e0b;"></i> 🎉 พุ่ง! ${rankOneName} ครองอันดับ 1 🚀`;
        document.body.appendChild(popDiv);
        setTimeout(() => {
            if(popDiv && popDiv.remove) popDiv.remove();
        }, 1200);
    }
    
    function listenLeaderboard() {
        db.ref('players').on('value', (snapshot) => {
            const players = [];
            snapshot.forEach(child => {
                const p = child.val();
                if (p && p.name && typeof p.score === 'number') {
                    players.push(p);
                }
            });
            players.sort((a,b) => b.score - a.score);
            allPlayers = players;
            renderLeaderboard();
            
            if (allPlayers.length > 0) {
                const rankOne = allPlayers[0];
                if (rankOne && rankOne.name) {
                    showCongratsForRankOne(rankOne.name);
                }
            }
        });
    }
    
    function renderLeaderboard() {
        if (allPlayers.length === 0) {
            rankContainer.innerHTML = '<div style="padding:16px; text-align:center; color:#688f68; font-size:12px;">🎮 รอผู้เล่นคนแรก...</div>';
            return;
        }
        let html = '';
        const limit = showFullRank ? allPlayers.length : 5;
        for (let i = 0; i < Math.min(limit, allPlayers.length); i++) {
            const p = allPlayers[i];
            const isMe = (p.name === playerName);
            let trophyHtml = '';
            if (i === 0) trophyHtml = '<i class="fas fa-crown trophy-gold"></i>';
            else if (i === 1) trophyHtml = '<i class="fas fa-medal trophy-silver"></i>';
            else if (i === 2) trophyHtml = '<i class="fas fa-medal trophy-bronze"></i>';
            
            const displayScore = p.score.toLocaleString('en-US');
            
            html += `
                <div class="rank-item" style="${isMe ? 'background:#e8f5e9;' : ''}">
                    <span class="name">
                        <b>${i+1}.</b> 
                        ${trophyHtml} 
                        ${p.name} <small>Lv.${p.level}</small>
                    </span>
                    <span class="pts">${displayScore} <i class="fas fa-bolt"></i></span>
                </div>
            `;
        }
        if (allPlayers.length > 5) {
            html += `<button class="show-more-btn" onclick="window.toggleRank()">${showFullRank ? '▲ ย่อหน้าต่าง' : '▼ ดูทั้งหมด ' + allPlayers.length + ' คน'}</button>`;
        }
        rankContainer.innerHTML = html;
    }

    window.toggleRank = function() { 
        showFullRank = !showFullRank; 
        renderLeaderboard(); 
    };
    
    // ฟังก์ชันกดเพิ่มคะแนน - ทำงานทันที ไม่มีดีเลย์
    function addScore() {
        if (!isGameReady) {
            showToast("กรอกชื่อก่อนนะ!", 1000, true);
            return;
        }
        
        // เพิ่มคะแนนทันที
        currentScore++;
        currentLevel = calcLevel(currentScore);
        updateUI();
        
        // อัปเดต Firebase (แบบไม่ต้องรอ)
        syncScoreToFirebase();
        
        // เอฟเฟกต์กด
        popImg.classList.add('pop-active');
        setTimeout(() => popImg.classList.remove('pop-active'), 80);
        
        // สั่นถ้ารองรับ
        if (navigator.vibrate) navigator.vibrate(10);
    }
    
    function savePlayerName() {
        let name = playerNameInput.value.trim();
        if (isInappropriateName(name)) {
            showToast("❌ ชื่อไม่สุภาพ กรุณาใช้ชื่อที่เหมาะสม!", 2000, true);
            return;
        }
        if (name === "") {
            showToast("❌ กรุณากรอกชื่อด้วยค่ะ/ครับ!", 1500, true);
            return;
        }
        
        playerName = sanitizeName(name);
        setGameEnabled(false);
        loadPlayerScoreFromFirebase();
        saveNameBtn.innerHTML = '✏️ เปลี่ยนชื่อ';
        playerNameInput.value = playerName;
    }
    
    function showToast(msg, dur=2000, err=false) {
        let t = document.createElement('div');
        t.className = 'toast-msg' + (err ? ' error' : '');
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), dur);
    }
    
    // ตรวจสอบ connection
    function checkConnection() {
        const connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            if (snap.val() === true) {
                onlineStatus.innerHTML = '<i class="fas fa-circle" style="color:#16a34a; font-size:6px;"></i> เชื่อมต่อออนไลน์ • อัปเดตเรียลไทม์';
                onlineStatus.style.color = "#16a34a";
            } else {
                onlineStatus.innerHTML = '<i class="fas fa-circle" style="color:#dc2626; font-size:6px;"></i> ออฟไลน์ • ข้อมูลจะอัปเดตเมื่อเชื่อมต่อ';
                onlineStatus.style.color = "#dc2626";
            }
        });
    }
    
    window.onload = () => {
        // Event listeners
        popImg.addEventListener('click', (e) => { 
            e.preventDefault(); 
            addScore(); 
        });
        popImg.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            addScore(); 
        }, {passive: false});
        
        saveNameBtn.onclick = savePlayerName;
        
        // กด Enter ในช่องชื่อได้
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                savePlayerName();
            }
        });
        
        listenLeaderboard();
        checkConnection();
        
        console.log("🎮 อุทยานป็อบ พร้อมใช้งานแล้ว! ไม่มีข้อจำกัดคะแนน");
        console.log("💡 วิธีเล่น: กรอกชื่อที่สุภาพ → กดที่รูปโลโก้ → คะแนนเพิ่มเรื่อยๆ ไม่มีวันหยุด!");
    };
</script>
</body>
</html>
